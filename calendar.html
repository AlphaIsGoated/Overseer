<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Calendar · Dashboard</title>
<script src="/api/config"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>

<style>
:root {
  --text-primary: #FAFAFA; --text-secondary: #B8B6B0; --text-tertiary: #76746E;
  --success: #6BE3A4; --warning: #F2C063; --danger: #FF6B6B;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: #050506; color: var(--text-secondary); font-family: var(--font); -webkit-font-smoothing: antialiased; }
body { min-height: 100vh; position: relative; overflow-x: hidden; padding: max(28px, env(safe-area-inset-top)) 20px 60px; }
body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(circle at 82% 14%, rgba(224,118,88,0.16), transparent 45%), radial-gradient(circle at 18% 90%, rgba(180,180,200,0.06), transparent 50%); filter: blur(40px); pointer-events: none; z-index: -2; animation: drift 36s ease-in-out infinite alternate; }
body::after { content: ''; position: fixed; inset: 0; background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px); background-size: 3px 3px; pointer-events: none; z-index: -1; }
@keyframes drift { 0%{transform:translate3d(0,0,0)} 100%{transform:translate3d(-22px,14px,0)} }

.page { max-width: 700px; margin: 0 auto; }
.back-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px 8px 10px; margin: 0 0 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 999px; color: var(--text-secondary); font-family: inherit; font-size: 12px; font-weight: 600; text-decoration: none; }
.back-btn:hover { background: rgba(255,255,255,0.07); color: var(--text-primary); }
.dash-title { margin: 0 0 4px; font-size: 28px; font-weight: 700; letter-spacing: -0.025em; background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent; }
.dash-sub { font-size: 13px; color: var(--text-tertiary); margin: 0 0 18px; }
@media (max-width: 480px) { .dash-title { font-size: 22px; } }

.gm-card { position: relative; background: rgba(255,255,255,0.04); border-radius: 16px; padding: 20px; margin-bottom: 14px; backdrop-filter: blur(24px) saturate(1.2); -webkit-backdrop-filter: blur(24px) saturate(1.2); box-shadow: 0 12px 40px rgba(0,0,0,0.45); }

.cal-status-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 4px; flex-wrap: wrap; }
.cal-status { display: inline-flex; align-items: center; gap: 7px; font-size: 13px; color: var(--text-secondary); }
.cal-status .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-tertiary); }
.cal-status.on .dot { background: var(--success); box-shadow: 0 0 8px rgba(107,227,164,0.6); }
.cal-sync { font-size: 11px; color: var(--text-tertiary); }
.cal-btn { padding: 10px 16px; border: 1px solid rgba(255,255,255,0.10); border-radius: 11px; background: rgba(255,255,255,0.04); color: var(--text-primary); font-family: inherit; font-size: 12.5px; font-weight: 700; cursor: pointer; transition: background 0.15s; }
.cal-btn:hover { background: rgba(255,255,255,0.08); }
.cal-btn:disabled { opacity: 0.4; cursor: default; }
.cal-btn-ghost { background: transparent; border: none; color: var(--danger); font-family: inherit; font-size: 12px; cursor: pointer; padding: 6px 0; text-decoration: underline; }
.cal-err { font-size: 12px; color: var(--danger); margin-top: 8px; }

/* Calendar list */
.cal-list-section { margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.07); }
.cal-list-title { font-size: 10px; font-weight: 700; letter-spacing: 0.10em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
.cal-list { display: flex; flex-direction: column; gap: 6px; }
.cal-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background 0.12s; }
.cal-item:hover { background: rgba(255,255,255,0.06); }
.cal-item input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--success); flex-shrink: 0; cursor: pointer; }
.cal-item-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.cal-item-name { font-size: 13px; color: var(--text-primary); font-weight: 500; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cal-item-primary { font-size: 10px; color: var(--text-tertiary); flex-shrink: 0; }
.cal-list-actions { display: flex; gap: 10px; margin-top: 10px; }
.cal-list-link { font-size: 11px; color: var(--success); cursor: pointer; background: none; border: none; font-family: inherit; padding: 0; text-decoration: underline; -webkit-tap-highlight-color: transparent; }
.cal-list-empty { font-size: 12px; color: var(--text-tertiary); font-style: italic; }

/* Agenda */
.day-group { margin-bottom: 16px; }
.day-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 8px; }
.day-label.today { color: var(--success); }
.event-row { display: flex; gap: 10px; align-items: center; padding: 10px 14px; margin-bottom: 6px; background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; text-decoration: none; border-left: 3px solid transparent; }
.event-row.done { opacity: 0.5; }
.event-row.done .event-title { text-decoration: line-through; }
.event-time { font-size: 12px; color: var(--text-tertiary); font-variant-numeric: tabular-nums; flex-shrink: 0; width: 64px; }
.event-title { font-size: 13.5px; color: var(--text-primary); font-weight: 600; flex: 1; min-width: 0; }
.event-src { font-size: 9.5px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; padding: 3px 8px; border-radius: 999px; flex-shrink: 0; white-space: nowrap; max-width: 110px; overflow: hidden; text-overflow: ellipsis; }
.event-src.marathon { background: rgba(255,138,138,0.12); color: var(--danger); }
.event-src.canvas { background: rgba(125,211,252,0.12); color: #7DD3FC; }
.event-src.goal { background: rgba(242,192,99,0.12); color: var(--warning); }
.event-src.google-cal { background: rgba(107,227,164,0.10); color: var(--success); }

.legend-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.empty-state { text-align: center; font-size: 12px; font-style: italic; color: var(--text-tertiary); padding: 20px 0; }

@media (max-width: 480px) { body { padding: max(20px, env(safe-area-inset-top)) 14px 50px; } .gm-card { padding: 16px; } }
</style>
</head>
<body>
<div class="page">

  <a href="index.html" class="back-btn" aria-label="Back to dashboard">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    <span>Back</span>
  </a>

  <h1 class="dash-title">Calendar</h1>
  <p class="dash-sub">Everything with a date, in one place — Google Calendars, marathon training, Canvas, and your daily goals.</p>

  <div class="gm-card">
    <div class="cal-status-row">
      <span class="cal-status" id="calStatus"><span class="dot"></span><span id="calStatusText">Not connected</span></span>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="cal-btn" id="calAction" type="button">Connect Google Calendar</button>
        <button class="cal-btn-ghost" id="calDisconnect" style="display:none" type="button">Disconnect</button>
      </div>
    </div>
    <div class="cal-sync" id="calSync"></div>
    <div class="cal-err hidden" id="calErr"></div>

    <!-- Calendar selector — shown after connecting -->
    <div class="cal-list-section hidden" id="calListSection">
      <div class="cal-list-title">
        <span>Your calendars</span>
        <div style="display:flex;gap:10px">
          <button class="cal-list-link" id="calSelectAll">All</button>
          <button class="cal-list-link" id="calSelectNone">None</button>
          <button class="cal-list-link" id="calRefreshList">↻ Refresh</button>
        </div>
      </div>
      <div class="cal-list" id="calList">
        <div class="cal-list-empty">Loading calendars…</div>
      </div>
    </div>
  </div>

  <div id="calEvents"></div>

  <div class="legend-row">
    <span class="event-src google-cal">Google</span>
    <span class="event-src marathon">Marathon</span>
    <span class="event-src canvas">Canvas</span>
    <span class="event-src goal">Goal</span>
  </div>

</div>

<script>
(function () {
  'use strict';
  const $ = (id) => document.getElementById(id);
  const TOKEN_KEY    = 'google_tokens_v1';
  const SYNC_KEY     = 'google_last_sync';
  const CALS_KEY     = 'google_calendars_v2';   // { list: [{id,name,color,primary}], selected: ['id',...] }
  const GOOGLE_CLIENT_ID = window.DASH_GOOGLE_CLIENT_ID || '';
  const GOOGLE_REDIRECT  = window.location.origin + '/api/google-callback';
  const SCOPE = 'https://www.googleapis.com/auth/calendar.readonly';

  function loadJSON(k, f) { try { return JSON.parse(localStorage.getItem(k)) ?? f; } catch { return f; } }
  function saveJSON(k, v) { localStorage.setItem(k, JSON.stringify(v)); }
  function escapeHtml(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  // ── OAuth token handling ──────────────────────────────────────
  if (location.hash && location.hash.includes('google_access')) {
    const h = new URLSearchParams(location.hash.slice(1));
    const access = h.get('google_access'), refresh = h.get('google_refresh');
    const expires = Number(h.get('google_expires')) || Date.now() + 3500e3;
    if (access) {
      saveJSON(TOKEN_KEY, { access, refresh, expires });
      history.replaceState(null, '', location.pathname + location.search);
    }
  }

  // ── Helpers ───────────────────────────────────────────────────
  function calErr(msg) { $('calErr').textContent = msg || ''; $('calErr').classList.toggle('hidden', !msg); }
  function relTime(ts) {
    if (!ts) return 'never';
    const sec = Math.floor((Date.now() - ts) / 1000);
    if (sec < 60) return 'just now';
    if (sec < 3600) return Math.floor(sec / 60) + ' min ago';
    if (sec < 86400) return Math.floor(sec / 3600) + ' h ago';
    return Math.floor(sec / 86400) + ' d ago';
  }
  function dateKeyLocal(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
  function fmtTime(d) { return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }); }
  function dayLabel(d, todayKey) {
    const key = dateKeyLocal(d);
    if (key === todayKey) return 'Today';
    const tmrw = new Date(); tmrw.setDate(tmrw.getDate() + 1);
    if (key === dateKeyLocal(tmrw)) return 'Tomorrow';
    return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  }

  // ── Google API fetch (proxied through server) ─────────────────
  async function googleRefresh(t) {
    if (!t.refresh) return null;
    try {
      const r = await fetch('/api/integrations/google', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-App-Secret': window.DASH_APP_SECRET || '' },
        body: JSON.stringify({ refresh_token: t.refresh }),
      });
      const j = await r.json();
      if (j.access_token) {
        const next = { access: j.access_token, refresh: j.refresh_token || t.refresh, expires: Date.now() + (j.expires_in || 3500) * 1000 };
        saveJSON(TOKEN_KEY, next); return next;
      }
    } catch {}
    return null;
  }
  async function googleFetch(path, t) {
    const [p, qs] = path.split('?');
    const params = new URLSearchParams(qs || ''); params.set('path', p);
    const r = await fetch('/api/integrations/google?' + params.toString(), {
      headers: { Authorization: 'Bearer ' + t.access, Accept: 'application/json', 'X-App-Secret': window.DASH_APP_SECRET || '' },
    });
    if (r.status === 401) { const n = await googleRefresh(t); if (n) return googleFetch(path, n); throw new Error('unauthorized — reconnect'); }
    if (!r.ok) throw new Error('Google ' + r.status);
    return r.json();
  }
  async function getToken() {
    let t = loadJSON(TOKEN_KEY, null);
    if (!t || !t.access) return null;
    if (t.expires && Date.now() > t.expires - 60000) { const n = await googleRefresh(t); if (n) t = n; }
    return t;
  }

  // ── Calendar list management ──────────────────────────────────
  async function fetchCalendarList() {
    const t = await getToken(); if (!t) return;
    try {
      const data = await googleFetch('/users/me/calendarList?minAccessRole=reader', t);
      const list = (data.items || []).map(c => ({
        id:      c.id,
        name:    c.summary || c.id,
        color:   c.backgroundColor || '#6BE3A4',
        primary: !!c.primary,
      }));
      const stored = loadJSON(CALS_KEY, { list: [], selected: [] });
      // Preserve existing selection; default-select all calendars on first fetch
      const knownIds = new Set((stored.list || []).map(c => c.id));
      const newIds   = list.filter(c => !knownIds.has(c.id)).map(c => c.id);
      const selected = [...new Set([...(stored.selected || list.map(c => c.id)), ...newIds])];
      saveJSON(CALS_KEY, { list, selected });
      renderCalendarList();
    } catch (e) {
      console.warn('Could not fetch calendar list:', e.message);
    }
  }

  function getSelectedCalendars() {
    const stored = loadJSON(CALS_KEY, { list: [], selected: [] });
    const list   = stored.list || [];
    const sel    = new Set(stored.selected || list.map(c => c.id));
    // Fallback: if no list yet, use primary
    return list.length ? list.filter(c => sel.has(c.id)) : [{ id: 'primary', name: 'Primary', color: '#6BE3A4', primary: true }];
  }

  function renderCalendarList() {
    const stored = loadJSON(CALS_KEY, { list: [], selected: [] });
    const list   = stored.list || [];
    const sel    = new Set(stored.selected || list.map(c => c.id));
    const section = $('calListSection');
    const container = $('calList');
    section.classList.remove('hidden');
    if (!list.length) {
      container.innerHTML = '<div class="cal-list-empty">No calendars found.</div>';
      return;
    }
    container.innerHTML = list.map(c => `
      <label class="cal-item">
        <input type="checkbox" data-id="${escapeHtml(c.id)}" ${sel.has(c.id) ? 'checked' : ''}>
        <span class="cal-item-dot" style="background:${escapeHtml(c.color)}"></span>
        <span class="cal-item-name">${escapeHtml(c.name)}</span>
        ${c.primary ? '<span class="cal-item-primary">PRIMARY</span>' : ''}
      </label>`).join('');

    // Wire checkbox changes
    container.querySelectorAll('input[type="checkbox"]').forEach(cb => {
      cb.addEventListener('change', () => {
        const s = loadJSON(CALS_KEY, { list, selected: list.map(c => c.id) });
        const newSel = new Set(s.selected || []);
        if (cb.checked) newSel.add(cb.dataset.id); else newSel.delete(cb.dataset.id);
        saveJSON(CALS_KEY, { ...s, selected: [...newSel] });
        syncCalendar(); // re-sync immediately when selection changes
      });
    });
  }

  function renderStatus() {
    const t = loadJSON(TOKEN_KEY, null);
    const statusEl = $('calStatus'), txt = $('calStatusText'), action = $('calAction');
    const disconnect = $('calDisconnect');
    if (!t || !t.access) {
      statusEl.classList.remove('on'); txt.textContent = 'Not connected';
      $('calSync').textContent = ''; $('calListSection').classList.add('hidden');
      action.textContent = GOOGLE_CLIENT_ID ? 'Connect Google Calendar' : 'Set GOOGLE_CLIENT_ID in Vercel';
      action.disabled = !GOOGLE_CLIENT_ID;
      disconnect.style.display = 'none';
      return;
    }
    statusEl.classList.add('on');
    const stored = loadJSON(CALS_KEY, { list: [] });
    const count  = (stored.list || []).length;
    txt.textContent = count > 1 ? count + ' calendars connected' : 'Connected';
    $('calSync').textContent = 'Last synced ' + relTime(Number(localStorage.getItem(SYNC_KEY)) || 0);
    action.textContent = 'Sync now'; action.disabled = false;
    disconnect.style.display = '';
  }

  // ── Calendar list toggle buttons ──────────────────────────────
  $('calSelectAll').addEventListener('click', () => {
    const s = loadJSON(CALS_KEY, { list: [] });
    saveJSON(CALS_KEY, { ...s, selected: (s.list || []).map(c => c.id) });
    renderCalendarList(); syncCalendar();
  });
  $('calSelectNone').addEventListener('click', () => {
    const s = loadJSON(CALS_KEY, { list: [] });
    saveJSON(CALS_KEY, { ...s, selected: [] });
    renderCalendarList(); renderAgenda();
  });
  $('calRefreshList').addEventListener('click', fetchCalendarList);
  $('calDisconnect').addEventListener('click', () => {
    if (!confirm('Disconnect Google Calendar? Your calendar data will be removed from this device.')) return;
    localStorage.removeItem(TOKEN_KEY);
    localStorage.removeItem(CALS_KEY);
    localStorage.removeItem(SYNC_KEY);
    lastGoogleItems = [];
    renderStatus(); renderAgenda();
  });

  // ── Other-module data aggregation ─────────────────────────────
  function gatherMarathonEntries() {
    const plan = loadJSON('marathon_plan_v1', null);
    if (!plan || !Array.isArray(plan.entries)) return [];
    return plan.entries.filter(e => e.date && e.type !== 'rest').map(e => ({
      dateKey: e.date, time: null, allDay: true,
      title: (e.label || e.type || 'Run') + (e.plannedDistanceMi ? ' (' + e.plannedDistanceMi + ' mi)' : ''),
      source: 'marathon', done: !!e.completed, href: 'marathon.html',
    }));
  }
  function gatherCanvasTasks() {
    const byCourse = loadJSON('canvas_tasks_v1', []);
    const out = [];
    (byCourse || []).forEach(group => (group.tasks || []).forEach(t => {
      const d = new Date(t.dueAt);
      out.push({ dateKey: dateKeyLocal(d), time: d, allDay: false, title: t.name + ' (' + group.course + ')', source: 'canvas', done: false, href: 'college.html' });
    }));
    return out;
  }
  function gatherGoals() {
    const out = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (!k || !k.startsWith('goals:')) continue;
      const dateKey = k.slice('goals:'.length);
      if (!/^\d{4}-\d{2}-\d{2}$/.test(dateKey)) continue;
      const goals = loadJSON(k, []);
      (goals || []).forEach(g => out.push({ dateKey, time: null, allDay: true, title: g.text, source: 'goal', done: !!g.done, href: 'main.html' }));
    }
    return out;
  }
  function gatherGoogleEvents(events) {
    return (events || []).map(ev => {
      const startRaw = (ev.start && (ev.start.dateTime || ev.start.date)) || '';
      if (!startRaw) return null;
      const d = new Date(startRaw);
      return {
        dateKey: dateKeyLocal(d),
        time:    ev.start.dateTime ? d : null,
        allDay:  !ev.start.dateTime,
        title:   ev.summary || '(no title)',
        source:  'google-cal',
        calName: ev._calName || 'Google',
        calColor: ev._calColor || '#6BE3A4',
        done:    false,
        href:    null,
      };
    }).filter(Boolean);
  }

  // ── Agenda renderer ───────────────────────────────────────────
  let lastGoogleItems = [];
  function renderAgenda() {
    const todayKey = dateKeyLocal(new Date());
    const horizon  = dateKeyLocal(new Date(Date.now() + 14 * 86400000));
    const all = [
      ...gatherGoogleEvents(lastGoogleItems),
      ...gatherMarathonEntries(),
      ...gatherCanvasTasks(),
      ...gatherGoals(),
    ].filter(it => it.dateKey >= todayKey && it.dateKey <= horizon);

    const groups = {};
    all.forEach(it => (groups[it.dateKey] = groups[it.dateKey] || []).push(it));
    const keys = Object.keys(groups).sort();
    const wrap = $('calEvents');
    if (!keys.length) {
      wrap.innerHTML = '<div class="gm-card"><div class="empty-state">Nothing in the next 14 days — connect Google Calendar above, or check Marathon / College / Goals.</div></div>';
      return;
    }
    wrap.innerHTML = keys.map(key => {
      const items = groups[key].slice().sort((a, b) => {
        if (a.allDay !== b.allDay) return a.allDay ? -1 : 1;
        return a.time && b.time ? a.time - b.time : 0;
      });
      const rows = items.map(it => {
        // Left accent border in the calendar's own color for Google events
        const borderStyle = it.source === 'google-cal' ? ` style="border-left-color:${escapeHtml(it.calColor)}"` : '';
        const srcLabel = it.source === 'google-cal' ? escapeHtml(it.calName) : it.source;
        const inner =
          '<span class="event-time">' + (it.allDay ? 'All day' : fmtTime(it.time)) + '</span>' +
          '<span class="event-title">' + escapeHtml(it.title) + '</span>' +
          '<span class="event-src ' + it.source + '">' + srcLabel + '</span>';
        return it.href
          ? `<a class="event-row${it.done ? ' done' : ''}" href="${it.href}"${borderStyle}>${inner}</a>`
          : `<div class="event-row${it.done ? ' done' : ''}"${borderStyle}>${inner}</div>`;
      }).join('');
      const d0 = new Date(key + 'T00:00');
      return `<div class="day-group"><div class="day-label${key === todayKey ? ' today' : ''}">${dayLabel(d0, todayKey)}</div>${rows}</div>`;
    }).join('');
  }

  // ── Sync all selected Google Calendars in parallel ────────────
  async function syncCalendar() {
    const t = await getToken();
    if (!t) { renderAgenda(); return; }
    calErr('');
    const timeMin = new Date().toISOString();
    const timeMax = new Date(Date.now() + 14 * 86400000).toISOString();
    const cals = getSelectedCalendars();

    try {
      const results = await Promise.all(cals.map(async cal => {
        const encodedId = encodeURIComponent(cal.id);
        const data = await googleFetch(
          `/calendars/${encodedId}/events?singleEvents=true&orderBy=startTime&timeMin=${encodeURIComponent(timeMin)}&timeMax=${encodeURIComponent(timeMax)}&maxResults=100`,
          t
        );
        // Tag each event with its calendar name + color for display
        return (data.items || []).map(ev => ({ ...ev, _calName: cal.name, _calColor: cal.color }));
      }));

      lastGoogleItems = results.flat();
      renderAgenda();
      localStorage.setItem(SYNC_KEY, String(Date.now()));
      renderStatus();
    } catch (e) {
      calErr(e.message || 'Could not sync your calendars.');
      renderAgenda();
      renderStatus();
    }
  }

  // ── Connect / Sync button ─────────────────────────────────────
  $('calAction').addEventListener('click', async () => {
    const t = loadJSON(TOKEN_KEY, null);
    if (t && t.access) {
      $('calAction').textContent = 'Syncing…';
      $('calAction').disabled = true;
      await syncCalendar();
      $('calAction').disabled = false;
      return;
    }
    if (!GOOGLE_CLIENT_ID) return;
    const url = 'https://accounts.google.com/o/oauth2/v2/auth'
      + '?client_id='    + encodeURIComponent(GOOGLE_CLIENT_ID)
      + '&redirect_uri=' + encodeURIComponent(GOOGLE_REDIRECT)
      + '&response_type=code'
      + '&scope='        + encodeURIComponent(SCOPE)
      + '&access_type=offline'
      + '&prompt=consent';
    window.location.href = url;
  });

  // ── Init ──────────────────────────────────────────────────────
  renderStatus();
  if (loadJSON(TOKEN_KEY, null)) {
    renderCalendarList();   // show saved calendar list immediately
    syncCalendar().then(() => {
      // After first sync, refresh the calendar list in the background
      if (!(loadJSON(CALS_KEY, { list: [] }).list || []).length) fetchCalendarList();
    });
    // Always try to fetch/refresh calendar list on load
    fetchCalendarList();
  } else {
    renderAgenda(); // show marathon/canvas/goals even before Google is connected
  }
  window.addEventListener('storage', renderAgenda);
})();
</script>
</body>
</html>
