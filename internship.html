<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Research &amp; Internships · Dashboard</title>
<script src="/api/config"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>

<style>
:root {
  --text-primary: #FAFAFA; --text-secondary: #B8B6B0; --text-tertiary: #76746E;
  --success: #6BE3A4; --warning: #F2C063; --danger: #FF6B6B;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: #050506; color: var(--text-secondary); font-family: var(--font); -webkit-font-smoothing: antialiased; }
body { min-height: 100vh; position: relative; overflow-x: hidden; padding: max(28px, env(safe-area-inset-top)) 20px 60px; }
body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(circle at 82% 14%, rgba(224,118,88,0.16), transparent 45%), radial-gradient(circle at 18% 90%, rgba(180,180,200,0.06), transparent 50%); filter: blur(40px); pointer-events: none; z-index: -2; animation: drift 36s ease-in-out infinite alternate; }
body::after { content: ''; position: fixed; inset: 0; background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px); background-size: 3px 3px; pointer-events: none; z-index: -1; }
@keyframes drift { 0%{transform:translate3d(0,0,0)} 100%{transform:translate3d(-22px,14px,0)} }

.page { max-width: 720px; margin: 0 auto; }
.back-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px 8px 10px; margin: 0 0 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 999px; color: var(--text-secondary); font-family: inherit; font-size: 12px; font-weight: 600; text-decoration: none; }
.back-btn:hover { background: rgba(255,255,255,0.07); color: var(--text-primary); }
.dash-title { margin: 0 0 4px; font-size: 28px; font-weight: 700; letter-spacing: -0.025em; background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent; }
.dash-sub { font-size: 13px; color: var(--text-tertiary); margin: 0 0 18px; }
@media (max-width: 480px) { .dash-title { font-size: 22px; } }

.section-title { font-size: 10.5px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-tertiary); display: flex; align-items: center; gap: 12px; margin: 18px 0 12px; }
.section-title::before { content: ''; width: 18px; height: 1px; background: var(--text-tertiary); opacity: 0.6; }
.section-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, rgba(255,255,255,0.08), transparent); }
.gm-card { position: relative; background: rgba(255,255,255,0.04); border-radius: 16px; padding: 20px; backdrop-filter: blur(24px) saturate(1.2); -webkit-backdrop-filter: blur(24px) saturate(1.2); box-shadow: 0 12px 40px rgba(0,0,0,0.45); margin-bottom: 14px; }

.gm-input { width: 100%; padding: 11px 14px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; background: rgba(0,0,0,0.28); color: var(--text-primary); font-family: inherit; font-size: 14px; outline: none; }
.gm-input::placeholder { color: var(--text-tertiary); }
textarea.gm-input { resize: vertical; min-height: 100px; line-height: 1.5; }
.field-label { font-size: 10.5px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 6px; display: block; }
.gm-add { padding: 11px 18px; border: 0; border-radius: 12px; background: linear-gradient(180deg, #FFFFFF 0%, #E8E5DD 100%); color: #0A0A0B; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; }
.gm-add:hover { filter: brightness(1.06); }
.gm-add:disabled { opacity: 0.5; cursor: default; }
.gm-ghost { padding: 10px 16px; border: 1px solid rgba(255,255,255,0.10); border-radius: 11px; background: rgba(255,255,255,0.04); color: var(--text-primary); font-family: inherit; font-size: 12.5px; font-weight: 700; cursor: pointer; }
.gm-ghost:hover { background: rgba(255,255,255,0.08); }
.save-ok { font-size: 11.5px; color: var(--success); margin-left: 10px; }

.opp-row { padding: 12px 16px; margin-bottom: 8px; background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; }
.opp-row.selected { border-color: rgba(110,231,183,0.4); background: rgba(110,231,183,0.06); }
.opp-header { display: flex; align-items: center; gap: 10px; cursor: pointer; }
.opp-title { flex: 1; font-size: 14px; font-weight: 700; color: var(--text-primary); }
.opp-company { font-size: 12px; color: var(--text-tertiary); }
.opp-actions { display: flex; gap: 8px; margin-top: 10px; }
.opp-delete { border: 0; background: transparent; color: var(--text-tertiary); font-size: 18px; cursor: pointer; opacity: 0.5; }
.opp-delete:hover { color: var(--danger); }
.empty-state { text-align: center; font-size: 12px; font-style: italic; color: var(--text-tertiary); padding: 14px 0; }

.draft-box { margin-top: 14px; padding: 16px; border-radius: 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); }
.draft-subj { font-size: 12px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 8px; }
.draft-text { font-size: 13.5px; color: var(--text-primary); line-height: 1.65; white-space: pre-wrap; margin-bottom: 14px; min-height: 80px; }
.draft-text[contenteditable="true"] { outline: 1px solid rgba(255,255,255,0.18); border-radius: 6px; padding: 8px; cursor: text; }
.draft-send-row { display: flex; gap: 8px; flex-wrap: wrap; }

@media (max-width: 480px) { body { padding: max(20px, env(safe-area-inset-top)) 14px 50px; } .gm-card { padding: 16px; } }
</style>
</head>
<body>
<div class="page">

  <a href="index.html" class="back-btn" aria-label="Back to dashboard">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    <span>Back</span>
  </a>

  <h1 class="dash-title">Research &amp; Internships</h1>
  <p class="dash-sub">Add opportunities, let AI draft a personalized email for each, then review and send yourself — no automated sending.</p>

  <!-- Resume context -->
  <div class="section-title" style="margin-top:0">Your background</div>
  <div class="gm-card">
    <label class="field-label" for="resumeCtx">Paste your resume / bio (the AI uses this to personalize each email)</label>
    <textarea class="gm-input" id="resumeCtx" placeholder="Name, major, relevant experience, skills, what you're looking for…" style="min-height:120px"></textarea>
    <button class="gm-ghost" id="resumeSave" type="button">Save context</button>
    <span class="save-ok hidden" id="resumeSaveOk">Saved ✓</span>
  </div>

  <!-- Opportunities -->
  <div class="section-title">Opportunities</div>
  <div class="gm-card">
    <div id="oppList"></div>
    <details style="margin-top:12px">
      <summary style="font-size:12.5px;color:var(--text-tertiary);cursor:pointer;font-weight:600">+ Add opportunity</summary>
      <div style="margin-top:12px">
        <label class="field-label">Role / project</label>
        <input class="gm-input" id="oppRole" type="text" placeholder="e.g. Software Engineering Intern" autocomplete="off">
        <label class="field-label">Company / lab / professor</label>
        <input class="gm-input" id="oppCompany" type="text" placeholder="e.g. Meta, Prof. Smith @ CWRU" autocomplete="off">
        <label class="field-label">Contact email (optional)</label>
        <input class="gm-input" id="oppEmail" type="email" placeholder="recruiter@company.com" autocomplete="off">
        <label class="field-label">Notes (job description snippet, why you want it)</label>
        <textarea class="gm-input" id="oppNotes" placeholder="Key skills listed, why this role, anything specific to mention…" style="min-height:80px"></textarea>
        <button class="gm-add" id="oppAdd" type="button">Add</button>
      </div>
    </details>
  </div>

  <!-- Draft email section -->
  <div id="draftSection" class="hidden">
    <div class="section-title">Draft email</div>
    <div class="gm-card">
      <div id="draftBusy" class="empty-state hidden">Drafting your email…</div>
      <div id="draftErr" class="hidden" style="font-size:12px;color:var(--danger);margin-bottom:10px"></div>
      <div id="draftResult" class="hidden">
        <div class="draft-subj">Subject</div>
        <div class="draft-text" id="draftSubject" contenteditable="true"></div>
        <div class="draft-subj">Body</div>
        <div class="draft-text" id="draftBody" contenteditable="true"></div>
        <div class="draft-send-row">
          <button class="gm-add" id="draftCopy" type="button">📋 Copy body</button>
          <button class="gm-ghost" id="draftMailto" type="button">📧 Open email client</button>
          <button class="gm-ghost" id="draftRegen" type="button">↺ Re-draft</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
(function () {
  'use strict';
  const $ = (id) => document.getElementById(id);
  const RESUME_KEY = 'internship:resume_ctx';
  const OPP_KEY = 'internship:opportunities';

  function loadJSON(k, f) { try { return JSON.parse(localStorage.getItem(k)) || f; } catch (e) { return f; } }
  function saveJSON(k, v) { localStorage.setItem(k, JSON.stringify(v)); }
  function escapeHtml(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  // ---- Resume context ----
  $('resumeCtx').value = localStorage.getItem(RESUME_KEY) || '';
  $('resumeSave').addEventListener('click', () => {
    localStorage.setItem(RESUME_KEY, $('resumeCtx').value.trim());
    $('resumeSaveOk').classList.remove('hidden');
    setTimeout(() => $('resumeSaveOk').classList.add('hidden'), 1600);
  });

  // ---- Opportunities ----
  let selectedOppId = null;

  function loadOpps() { return loadJSON(OPP_KEY, []); }
  function saveOpps(list) { saveJSON(OPP_KEY, list); }

  function renderOpps() {
    const opps = loadOpps();
    const wrap = $('oppList');
    if (!opps.length) { wrap.innerHTML = '<div class="empty-state">No opportunities yet — add one below.</div>'; return; }
    wrap.innerHTML = opps.map(o =>
      '<div class="opp-row' + (o.id === selectedOppId ? ' selected' : '') + '" data-id="' + o.id + '">' +
        '<div class="opp-header">' +
          '<div><div class="opp-title">' + escapeHtml(o.role) + '</div><div class="opp-company">' + escapeHtml(o.company) + '</div></div>' +
          '<button class="gm-ghost" data-action="draft" style="padding:7px 12px;font-size:12px">✨ Draft email</button>' +
          '<button class="opp-delete" data-action="delete" type="button">×</button>' +
        '</div>' +
      '</div>'
    ).join('');
    wrap.querySelectorAll('.opp-row').forEach(row => {
      const id = row.dataset.id;
      row.querySelector('[data-action="draft"]').addEventListener('click', () => startDraft(id));
      row.querySelector('[data-action="delete"]').addEventListener('click', () => {
        saveOpps(loadOpps().filter(o => o.id !== id));
        if (selectedOppId === id) { selectedOppId = null; $('draftSection').classList.add('hidden'); }
        renderOpps();
      });
    });
  }

  $('oppAdd').addEventListener('click', () => {
    const role = $('oppRole').value.trim();
    const company = $('oppCompany').value.trim();
    if (!role || !company) return;
    const opps = loadOpps();
    opps.push({ id: 'o_' + Date.now(), role, company, email: $('oppEmail').value.trim(), notes: $('oppNotes').value.trim() });
    saveOpps(opps);
    $('oppRole').value = ''; $('oppCompany').value = ''; $('oppEmail').value = ''; $('oppNotes').value = '';
    renderOpps();
  });

  // ---- Email drafting ----
  const DRAFT_SYS =
    "You are an expert at writing concise, genuine, personalized outreach emails for internships and "
    + "research positions. Write a short, specific cold email (Subject + Body) that: "
    + "reads like a REAL human wrote it (not a generic template), mentions 1-2 SPECIFIC reasons this "
    + "opportunity is a good match for this specific person based on their background, is respectful of "
    + "the recipient's time (keep the body to 3-4 short paragraphs max), and ends with a clear single ask "
    + "(a 20-min call, attaching resume, or reviewing your application). "
    + "Do NOT start with 'I hope this email finds you well' or similar platitudes. "
    + "Reply in exactly this format with no extra text: "
    + "SUBJECT: <subject line here>\\nBODY:\\n<email body here>";

  async function startDraft(oppId) {
    selectedOppId = oppId;
    renderOpps();
    const opp = loadOpps().find(o => o.id === oppId);
    if (!opp) return;
    $('draftSection').classList.remove('hidden');
    $('draftBusy').classList.remove('hidden');
    $('draftResult').classList.add('hidden');
    $('draftErr').classList.add('hidden');
    const resumeCtx = localStorage.getItem(RESUME_KEY) || '';
    const prompt = 'My background:\n' + (resumeCtx || '(not provided — do your best)') +
      '\n\nOpportunity:\nRole: ' + opp.role + '\nCompany/lab: ' + opp.company +
      (opp.notes ? '\nNotes: ' + opp.notes : '');
    try {
      const res = await fetch('/api/ai/ai-chat', {
        method: 'POST',
        headers: { 'content-type': 'application/json', 'x-app-secret': (window.DASH_APP_SECRET || '') },
        body: JSON.stringify({ system: DRAFT_SYS, messages: [{ role: 'user', content: prompt }] })
      });
      if (window.logApiUsage) window.logApiUsage(res.headers.get('X-Usage-Input-Tokens'), res.headers.get('X-Usage-Output-Tokens'), res.headers.get('X-Usage-Model'));
      const json = await res.json();
      $('draftBusy').classList.add('hidden');
      if (!res.ok || json.error) { $('draftErr').textContent = json.error || 'Something went wrong.'; $('draftErr').classList.remove('hidden'); return; }
      const text = json.text || '';
      const subMatch = text.match(/^SUBJECT:\s*(.+)/m);
      const bodyMatch = text.match(/^BODY:\s*([\s\S]+)/m);
      $('draftSubject').textContent = subMatch ? subMatch[1].trim() : '(no subject)';
      $('draftBody').textContent = bodyMatch ? bodyMatch[1].trim() : text;
      $('draftResult').classList.remove('hidden');
    } catch (e) {
      $('draftBusy').classList.add('hidden');
      $('draftErr').textContent = (e && e.message) || 'Could not reach the AI.';
      $('draftErr').classList.remove('hidden');
    }
  }

  $('draftCopy').addEventListener('click', () => {
    navigator.clipboard.writeText($('draftBody').textContent || '').catch(() => {});
    $('draftCopy').textContent = '✓ Copied';
    setTimeout(() => $('draftCopy').textContent = '📋 Copy body', 1500);
  });
  $('draftMailto').addEventListener('click', () => {
    const opp = loadOpps().find(o => o.id === selectedOppId) || {};
    const subj = encodeURIComponent($('draftSubject').textContent || '');
    const body = encodeURIComponent($('draftBody').textContent || '');
    const to = encodeURIComponent(opp.email || '');
    window.open('mailto:' + to + '?subject=' + subj + '&body=' + body, '_blank');
  });
  $('draftRegen').addEventListener('click', () => { if (selectedOppId) startDraft(selectedOppId); });

  window.addEventListener('storage', renderOpps);
  renderOpps();

  if (window.initCloudSync) {
    window.initCloudSync({ appKey: 'internship', syncedKeys: [OPP_KEY], onApplied: renderOpps });
  }
})();
</script>
</body>
</html>
