<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Notes · Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>

<style>
:root {
  --text-primary: #FAFAFA; --text-secondary: #B8B6B0; --text-tertiary: #76746E;
  --success: #6BE3A4; --warning: #F2C063; --danger: #FF6B6B;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0; background: #050506; color: var(--text-secondary);
  font-family: var(--font); -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
}
body { min-height: 100vh; position: relative; overflow-x: hidden; padding: max(28px, env(safe-area-inset-top)) 20px 60px; }
body::before {
  content: ''; position: fixed; inset: 0;
  background: radial-gradient(circle at 82% 14%, rgba(224,118,88,0.16), transparent 45%), radial-gradient(circle at 18% 90%, rgba(180,180,200,0.06), transparent 50%);
  filter: blur(40px); pointer-events: none; z-index: -2; animation: drift 36s ease-in-out infinite alternate;
}
body::after { content: ''; position: fixed; inset: 0; background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px); background-size: 3px 3px; pointer-events: none; z-index: -1; }
@keyframes drift { 0%{transform:translate3d(0,0,0)} 100%{transform:translate3d(-22px,14px,0)} }

.page { max-width: 760px; margin: 0 auto; }
.back-btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px 8px 10px; margin: 0 0 14px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 999px;
  color: var(--text-secondary); font-family: inherit; font-size: 12px; font-weight: 600; letter-spacing: 0.02em;
  text-decoration: none; -webkit-tap-highlight-color: transparent; transition: background 0.15s ease, color 0.15s ease;
}
.back-btn:hover, .back-btn:active { background: rgba(255,255,255,0.07); color: var(--text-primary); }
.dash-title { margin: 0 0 14px; font-size: 28px; font-weight: 700; letter-spacing: -0.025em; background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent; }
@media (max-width: 480px) { .dash-title { font-size: 22px; } }

.gm-card { position: relative; background: rgba(255,255,255,0.04); border-radius: 16px; padding: 20px; margin-bottom: 14px; backdrop-filter: blur(24px) saturate(1.2); -webkit-backdrop-filter: blur(24px) saturate(1.2); box-shadow: 0 12px 40px rgba(0,0,0,0.45); }

.notes-toolbar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.notes-import-btn { padding: 7px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.10); background: rgba(255,255,255,0.04); color: var(--text-secondary); font-family: inherit; font-size: 11.5px; font-weight: 700; cursor: pointer; }
.notes-import-btn:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }
.notes-search { flex: 1; min-width: 140px; padding: 11px 14px; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; background: rgba(0,0,0,0.28); color: var(--text-primary); font-family: inherit; font-size: 14px; outline: none; }
.notes-search::placeholder { color: var(--text-tertiary); }
.notes-search:focus { border-color: rgba(255,255,255,0.28); }
.notes-new {
  padding: 11px 18px; border: 0; border-radius: 12px; background: linear-gradient(180deg, #FFFFFF 0%, #E8E5DD 100%);
  color: #0A0A0B; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 2px 8px rgba(0,0,0,0.35);
}
.notes-new:hover { filter: brightness(1.06); }

.note-card { padding: 16px; margin-bottom: 10px; background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; cursor: pointer; transition: background 0.15s, border-color 0.15s; }
.note-card:hover { background: rgba(255,255,255,0.055); border-color: rgba(255,255,255,0.12); }
.note-card.pinned { border-color: rgba(242,192,99,0.35); }
.note-row-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 4px; }
.note-title { font-size: 15px; font-weight: 700; color: var(--text-primary); word-break: break-word; }
.note-title:empty::before { content: 'Untitled note'; color: var(--text-tertiary); font-weight: 500; }
.note-pin { border: 0; background: transparent; color: var(--text-tertiary); font-size: 15px; cursor: pointer; flex-shrink: 0; opacity: 0.5; }
.note-pin.on { opacity: 1; color: var(--warning); }
.note-snippet { font-size: 12.5px; color: var(--text-tertiary); line-height: 1.45; white-space: pre-wrap; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.note-meta { font-size: 10.5px; color: var(--text-tertiary); margin-top: 8px; letter-spacing: 0.03em; }
.empty-state { text-align: center; font-size: 12px; font-style: italic; color: var(--text-tertiary); padding: 30px 0; }

.note-modal-bg { position: fixed; inset: 0; z-index: 200; display: none; align-items: flex-start; justify-content: center; padding: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(6px); }
.note-modal-bg.show { display: flex; }
.note-modal { width: 100%; max-width: 760px; min-height: 100vh; background: #0A0A0B; padding: max(20px, env(safe-area-inset-top)) 20px 40px; }
.note-modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 10px; }
.note-modal-btn { border: 0; background: transparent; color: var(--text-secondary); font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; padding: 8px 10px; }
.note-modal-btn:hover { color: var(--text-primary); }
.note-modal-btn.danger:hover { color: var(--danger); }
.note-title-input { width: 100%; border: 0; background: transparent; color: var(--text-primary); font-family: inherit; font-size: 22px; font-weight: 700; outline: none; margin-bottom: 12px; }
.note-title-input::placeholder { color: var(--text-tertiary); }
.note-body-input { width: 100%; min-height: 60vh; border: 0; background: transparent; color: var(--text-secondary); font-family: inherit; font-size: 15px; line-height: 1.6; outline: none; resize: none; }
.note-body-input::placeholder { color: var(--text-tertiary); }

@media (max-width: 480px) { body { padding: max(20px, env(safe-area-inset-top)) 14px 50px; } .gm-card { padding: 16px; } }

/* ===== Note import animation — JARVIS acquisition sequence ===== */
.nim-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: radial-gradient(ellipse 70% 55% at 50% 48%, #061009 0%, #020402 55%, #010201 100%);
  display: none; flex-direction: column; align-items: center; justify-content: center;
  gap: 14px; cursor: default; padding: 20px; overflow: hidden;
  animation: nimFadeIn 0.22s ease forwards;
}
@media (max-width: 480px) { .nim-overlay { gap: 10px; } }
.nim-overlay.exiting { animation: nimFadeOut 0.35s ease forwards; }
.nim-overlay::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background-image: radial-gradient(rgba(110,231,183,0.055) 1px, transparent 1px);
  background-size: 26px 26px;
}
.nim-overlay::after {
  content: ''; position: absolute; left: 0; right: 0; top: 0; height: 1.5px;
  background: linear-gradient(90deg, transparent, rgba(103,232,249,0.55) 45%, rgba(110,231,183,0.9) 50%, rgba(103,232,249,0.55) 55%, transparent);
  animation: nimScanline 1.1s linear infinite;
}
@keyframes nimFadeIn  { from { opacity: 0; } to { opacity: 1; } }
@keyframes nimFadeOut { from { opacity: 1; } to { opacity: 0; } }
@keyframes nimScanline { 0% { transform: translateY(0); opacity: 0; } 5% { opacity: 1; } 95% { opacity: 0.7; } 100% { transform: translateY(100vh); opacity: 0; } }
@keyframes nimSpin    { to { transform: rotate(360deg); } }
@keyframes nimSpinRev { to { transform: rotate(-360deg); } }
@keyframes nimPulse   { 0%,100% { filter: drop-shadow(0 0 5px rgba(110,231,183,0.55)); } 50% { filter: drop-shadow(0 0 18px rgba(110,231,183,1)); } }
@keyframes nimOrbit   { to { transform: rotate(360deg); } }

.nim-rings-wrap { position: relative; width: min(220px, 56vw); height: min(220px, 56vw); }
.nim-svg { width: 100%; height: 100%; overflow: visible; }
.nim-ring { fill: none; transform-origin: 110px 110px; }
.nim-r-outer { stroke: #6EE7B7; stroke-width: 1; stroke-dasharray: 3 9; opacity: 0.45; animation: nimSpin 12s linear infinite; }
.nim-r-mid   { stroke: #67E8F9; stroke-width: 1.8; stroke-dasharray: 22 6 3 6; opacity: 0.7; animation: nimSpinRev 7s linear infinite; }
.nim-r-inner { stroke: #6EE7B7; stroke-width: 1; stroke-dasharray: 1.5 5; opacity: 0.45; animation: nimSpin 4.5s linear infinite; }
.nim-progress { fill: none; stroke: #6EE7B7; stroke-width: 1.5; opacity: 0.75;
  stroke-dasharray: 670; stroke-dashoffset: 670;
  transform: rotate(-90deg); transform-origin: 110px 110px;
  filter: drop-shadow(0 0 5px rgba(110,231,183,0.7));
  transition: stroke-dashoffset 0.75s cubic-bezier(0.25,0.8,0.25,1);
}
.nim-sweep { stroke: #67E8F9; stroke-width: 1.5; transform-origin: 110px 110px; animation: nimSpin 1.8s linear infinite; filter: drop-shadow(0 0 6px rgba(103,232,249,0.95)); }
.nim-sweep-trail { fill: none; stroke: rgba(103,232,249,0.09); stroke-width: 50; transform-origin: 110px 110px; animation: nimSpin 1.8s linear infinite; }
.nim-core-glow { fill: #6EE7B7; opacity: 0.14; animation: nimPulse 1.4s ease-in-out infinite; }
.nim-core { fill: #020404; stroke: #6EE7B7; stroke-width: 1.3; animation: nimPulse 1.4s ease-in-out infinite; }
.nim-hex { fill: none; stroke: #67E8F9; stroke-width: 0.8; opacity: 0.6; transform-origin: 110px 110px; animation: nimSpinRev 18s linear infinite; }
.nim-orbital { fill: #67E8F9; transform-origin: 110px 110px; filter: drop-shadow(0 0 3px #67E8F9); animation: nimOrbit 3.8s linear infinite; opacity: 0.9; }
.nim-tick { stroke: #6EE7B7; stroke-width: 1.2; opacity: 0.28; }

.nim-sys-label {
  font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 9px; font-weight: 700;
  letter-spacing: 0.10em; text-transform: uppercase; color: rgba(110,231,183,0.45);
  max-width: min(320px, 86vw); text-align: center;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.nim-status {
  font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11.5px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase; color: #8eeebf;
  min-height: 18px; text-align: center; max-width: min(280px, 86vw);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.nim-title-display {
  font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
  font-size: clamp(13px, 3.8vw, 19px); font-weight: 700; color: #eafff6;
  text-shadow: 0 0 20px rgba(110,231,183,0.7), 0 0 50px rgba(110,231,183,0.3);
  letter-spacing: -0.01em; text-align: center;
  max-width: min(320px, 86vw);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  opacity: 0; transition: opacity 0.4s ease 0.5s;
}
.nim-title-display.show { opacity: 1; }
.nim-footer {
  font-family: ui-monospace, monospace; font-size: 9px; letter-spacing: 0.08em;
  color: rgba(110,231,183,0.28); text-transform: uppercase; text-align: center;
  max-width: min(280px, 86vw); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  opacity: 0; transition: opacity 0.3s ease 0.8s;
}
.nim-footer.show { opacity: 1; }
.nim-data-stream { position: absolute; top: 50%; transform: translateY(-50%); font-family: ui-monospace, monospace; font-size: 8px; letter-spacing: 0.04em; color: rgba(110,231,183,0.22); line-height: 1.9; white-space: nowrap; user-select: none; pointer-events: none; }
.nim-data-left  { left: 10px; }
.nim-data-right { right: 10px; }
@media (max-width: 480px) { .nim-data-stream { display: none; } }
@keyframes nimScanBarSlide { 0% { left: -40%; } 100% { left: 110%; } }
</style>
</head>
<body>
<!-- Note import acquisition animation -->
<div class="nim-overlay" id="nimOverlay">
  <div class="nim-data-stream nim-data-left" id="nimDataLeft"></div>
  <div class="nim-data-stream nim-data-right" id="nimDataRight"></div>

  <div class="nim-sys-label">OVERSEER · NOTE CAPTURE</div>

  <div class="nim-rings-wrap">
    <svg class="nim-svg" viewBox="0 0 220 220">
      <g id="nimTicks"></g>
      <!-- Sweep trail -->
      <path class="nim-sweep-trail" d="M110 110 L110 15 A95 95 0 0 1 205 110 Z" transform-origin="110px 110px" style="animation: nimSpin 1.8s linear infinite;"/>
      <!-- Rings -->
      <circle class="nim-ring nim-r-outer" cx="110" cy="110" r="100"/>
      <!-- Progress arc tracks acquisition completion -->
      <circle class="nim-progress" id="nimProgressArc" cx="110" cy="110" r="100"/>
      <!-- Radar sweep -->
      <line class="nim-sweep" x1="110" y1="110" x2="110" y2="15"/>
      <circle class="nim-ring nim-r-mid" cx="110" cy="110" r="75"/>
      <!-- Crosshair lines — "locking on" to target -->
      <line stroke="rgba(110,231,183,0.35)" stroke-width="0.8" x1="45" y1="110" x2="72" y2="110"/>
      <line stroke="rgba(110,231,183,0.35)" stroke-width="0.8" x1="148" y1="110" x2="175" y2="110"/>
      <line stroke="rgba(110,231,183,0.35)" stroke-width="0.8" x1="110" y1="45" x2="110" y2="72"/>
      <line stroke="rgba(110,231,183,0.35)" stroke-width="0.8" x1="110" y1="148" x2="110" y2="175"/>
      <!-- Corner brackets — targeting reticle -->
      <path d="M60 75 L60 60 L75 60" fill="none" stroke="#6EE7B7" stroke-width="1.5" opacity="0.6"/>
      <path d="M160 75 L160 60 L145 60" fill="none" stroke="#6EE7B7" stroke-width="1.5" opacity="0.6"/>
      <path d="M60 145 L60 160 L75 160" fill="none" stroke="#6EE7B7" stroke-width="1.5" opacity="0.6"/>
      <path d="M160 145 L160 160 L145 160" fill="none" stroke="#6EE7B7" stroke-width="1.5" opacity="0.6"/>
      <circle class="nim-ring nim-r-inner" cx="110" cy="110" r="50"/>
      <!-- Orbital satellite -->
      <circle class="nim-orbital" cx="110" cy="15" r="2.5"/>
      <!-- Core -->
      <circle class="nim-core-glow" cx="110" cy="110" r="25"/>
      <circle class="nim-core" cx="110" cy="110" r="16"/>
      <polygon class="nim-hex" points="110,97 121,103.5 121,116.5 110,123 99,116.5 99,103.5"/>
      <circle cx="110" cy="110" r="2.5" fill="#67E8F9" style="filter:drop-shadow(0 0 5px #67E8F9)"/>
    </svg>
  </div>

  <!-- Scan bar — sweeps across like a document scanner -->
  <div style="width:min(300px,75vw);height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;position:relative">
    <div id="nimScanBar" style="position:absolute;top:0;left:-40%;width:40%;height:100%;background:linear-gradient(90deg,transparent,rgba(110,231,183,0.8),rgba(103,232,249,1),rgba(110,231,183,0.8),transparent);border-radius:2px;animation:nimScanBarSlide 0.6s ease-in-out 3"></div>
  </div>

  <div class="nim-status" id="nimStatus">SCANNING…</div>
  <div class="nim-title-display" id="nimTitleDisplay"></div>
  <div class="nim-footer" id="nimFooter">ENCRYPTED · SAVED · INDEXED</div>
</div>

<!-- Full-page drop overlay — appears when text is dragged over the window -->
<div id="dropOverlay" style="display:none;position:fixed;inset:0;z-index:9000;background:rgba(6,9,10,0.88);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);align-items:center;justify-content:center;flex-direction:column;gap:16px;pointer-events:none">
  <div style="width:80px;height:80px;border-radius:50%;border:2.5px solid #6EE7B7;display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 0 30px rgba(110,231,183,0.5)">📝</div>
  <div style="font-size:20px;font-weight:700;color:#FAFAFA;letter-spacing:-0.01em">Drop to save as a note</div>
  <div style="font-size:13px;color:rgba(110,231,183,0.7)">Drag a note from the sidebar, or selected text from within a note</div>
</div>

<div class="page">

  <a href="index.html" class="back-btn" aria-label="Back to dashboard">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    <span>Back</span>
  </a>

  <h1 class="dash-title">Notes</h1>

  <div class="gm-card">
    <div class="notes-toolbar">
      <input class="notes-search" id="notesSearch" type="text" placeholder="Search notes…" autocomplete="off">
      <button class="notes-new" id="notesNew" type="button">+ New note</button>
    </div>
    <!-- Quick paste zone for Apple Notes — no export needed -->
    <div id="applePasteZone" style="border:1.5px dashed rgba(110,231,183,0.25);border-radius:12px;padding:12px 14px;margin-bottom:10px;cursor:text;transition:border-color 0.15s">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span style="font-size:15px">🍎</span>
        <span style="font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-tertiary)">Paste Apple Note</span>
        <span style="font-size:10px;color:rgba(255,255,255,0.2);margin-left:auto">or drag &amp; drop text</span>
      </div>
      <textarea id="applePasteArea" placeholder="Open a note in Apple Notes → Cmd+A → Cmd+C → click here → Cmd+V" style="width:100%;min-height:60px;resize:none;background:transparent;border:none;color:var(--text-primary);font-family:inherit;font-size:13px;outline:none;line-height:1.5" rows="3"></textarea>
      <div style="display:flex;align-items:center;gap:8px;margin-top:6px">
        <input id="applePasteTitle" type="text" placeholder="Note title (optional — defaults to first line)" style="flex:1;min-width:0;background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:7px 10px;color:var(--text-primary);font-family:inherit;font-size:12.5px;outline:none">
        <button id="applePasteImport" type="button" style="padding:7px 14px;border:0;border-radius:8px;background:linear-gradient(180deg,#fff,#e8e5dd);color:#0a0a0b;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0">Import note</button>
      </div>
    </div>

    <div class="notes-import-row" id="notesImportRow" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
      <button class="notes-import-btn" id="importClaudeBtn" type="button" title="Import Claude conversations.json">💬 Claude export</button>
      <button class="notes-import-btn" id="importChatGPTBtn" type="button" title="Import ChatGPT conversations.json">🤖 ChatGPT export</button>
      <button class="notes-import-btn" id="importAppleBtn" type="button" title="Import Apple Notes .txt export (multiple files)">📁 Apple Notes files</button>
      <div id="importStatus" style="font-size:11px;color:#6BE3A4;align-self:center;padding-left:4px"></div>
    </div>
    <input type="file" id="importAppleFile" accept=".txt,.html,text/plain,text/html" multiple style="display:none">
    <input type="file" id="importClaudeFile" accept=".json,application/json" style="display:none">
    <input type="file" id="importChatGPTFile" accept=".json,application/json" style="display:none">
    <div id="notesList"></div>
  </div>

</div>

<!-- Editor (full-screen-ish, mobile-friendly) -->
<div class="note-modal-bg" id="noteModalBg">
  <div class="note-modal">
    <div class="note-modal-head">
      <button class="note-modal-btn" id="noteClose" type="button">‹ Close</button>
      <div>
        <button class="note-modal-btn" id="notePin" type="button">📌 Pin</button>
        <button class="note-modal-btn danger" id="noteDelete" type="button">Delete</button>
      </div>
    </div>
    <input class="note-title-input" id="noteTitleInput" type="text" placeholder="Title">
    <textarea class="note-body-input" id="noteBodyInput" placeholder="Start typing…"></textarea>
  </div>
</div>

<script>
(function () {
  'use strict';
  const $ = (id) => document.getElementById(id);
  const STORE_KEY = 'notes:items';

  function load() { try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; } catch (e) { return []; } }
  function save(items) { localStorage.setItem(STORE_KEY, JSON.stringify(items)); }

  let activeId = null;
  let saveT = null;

  function fmtDate(ts) {
    const d = new Date(ts);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' · ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  }

  function render() {
    const q = $('notesSearch').value.trim().toLowerCase();
    let items = load();
    items.sort((a, b) => (b.pinned - a.pinned) || (b.updatedAt - a.updatedAt));
    if (q) items = items.filter(n => (n.title || '').toLowerCase().includes(q) || (n.body || '').toLowerCase().includes(q));
    const list = $('notesList');
    if (!items.length) {
      list.innerHTML = '<div class="empty-state">' + (q ? 'No notes match “' + escapeHtml(q) + '”.' : 'No notes yet — tap “+ New note” to start.') + '</div>';
      return;
    }
    list.innerHTML = items.map(n =>
      '<div class="note-card' + (n.pinned ? ' pinned' : '') + '" data-id="' + n.id + '">' +
        '<div class="note-row-top"><div class="note-title">' + escapeHtml(n.title || '') + '</div>' +
          (n.pinned ? '<span class="note-pin on">📌</span>' : '') +
        '</div>' +
        '<div class="note-snippet">' + escapeHtml((n.body || '').slice(0, 200)) + '</div>' +
        '<div class="note-meta">' + fmtDate(n.updatedAt) + '</div>' +
      '</div>'
    ).join('');
    list.querySelectorAll('.note-card').forEach(c => c.addEventListener('click', () => openNote(c.dataset.id)));
  }
  function escapeHtml(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function openNote(id) {
    const items = load();
    const n = items.find(x => x.id === id);
    if (!n) return;
    activeId = id;
    $('noteTitleInput').value = n.title || '';
    $('noteBodyInput').value = n.body || '';
    $('notePin').classList.toggle('on', !!n.pinned);
    $('noteModalBg').classList.add('show');
    setTimeout(() => $('noteTitleInput').focus(), 50);
  }
  function newNote() {
    const items = load();
    const n = { id: 'n_' + Date.now(), title: '', body: '', pinned: false, updatedAt: Date.now() };
    items.unshift(n);
    save(items);
    openNote(n.id);
  }
  function persistActive() {
    if (!activeId) return;
    const items = load();
    const n = items.find(x => x.id === activeId);
    if (!n) return;
    n.title = $('noteTitleInput').value;
    n.body = $('noteBodyInput').value;
    n.updatedAt = Date.now();
    save(items);
  }
  function closeNote() {
    persistActive();
    // Drop completely empty notes instead of leaving clutter behind.
    const items = load();
    const n = items.find(x => x.id === activeId);
    if (n && !n.title.trim() && !n.body.trim()) {
      save(items.filter(x => x.id !== activeId));
    }
    activeId = null;
    $('noteModalBg').classList.remove('show');
    render();
  }

  $('notesNew').addEventListener('click', newNote);
  $('notesSearch').addEventListener('input', render);
  $('noteClose').addEventListener('click', closeNote);
  $('notePin').addEventListener('click', () => {
    const items = load();
    const n = items.find(x => x.id === activeId);
    if (!n) return;
    n.pinned = !n.pinned; n.updatedAt = Date.now();
    save(items);
    $('notePin').classList.toggle('on', n.pinned);
  });
  $('noteDelete').addEventListener('click', () => {
    if (!activeId) return;
    save(load().filter(x => x.id !== activeId));
    activeId = null;
    $('noteModalBg').classList.remove('show');
    render();
  });
  [$('noteTitleInput'), $('noteBodyInput')].forEach(el => {
    el.addEventListener('input', () => {
      clearTimeout(saveT);
      saveT = setTimeout(persistActive, 400);
    });
  });

  // ---- Multi-source import ----
  // Each source exports in a very different format; we normalize each
  // to {title, body} then merge with existing notes, deduplicating by title.
  function importStatus(msg, ok) {
    const el = $('importStatus');
    el.textContent = msg;
    el.style.color = ok ? '#6BE3A4' : '#FF8A8A';
    if (ok) setTimeout(() => { el.textContent = ''; }, 3000);
  }
  function mergeNotes(incoming) {
    const existing = load();
    const titles = new Set(existing.map(n => (n.title || '').toLowerCase().trim()));
    let added = 0;
    incoming.forEach(({ title, body }) => {
      const t = (title || '').trim() || 'Imported note';
      if (titles.has(t.toLowerCase())) return; // skip duplicates
      existing.unshift({ id: 'n_' + Date.now() + '_' + Math.random().toString(36).slice(2), title: t, body: (body || '').trim(), pinned: false, updatedAt: Date.now() });
      titles.add(t.toLowerCase());
      added++;
    });
    save(existing);
    render();
    return added;
  }

  // ---- Apple Notes quick paste (no export needed) ----
  // The paste zone accepts text pasted or dragged directly from Apple Notes.
  // User flow: open note → Cmd+A → Cmd+C → click textarea → Cmd+V → Import.
  const pasteZone = $('applePasteZone');
  const pasteArea = $('applePasteArea');
  const pasteTitleInput = $('applePasteTitle');

  // Highlight border when focused
  pasteArea.addEventListener('focus', () => pasteZone.style.borderColor = 'rgba(110,231,183,0.6)');
  pasteArea.addEventListener('blur', () => pasteZone.style.borderColor = 'rgba(110,231,183,0.25)');

  // Drag-and-drop text from Apple Notes
  pasteZone.addEventListener('dragover', (e) => { e.preventDefault(); pasteZone.style.borderColor = 'rgba(110,231,183,0.8)'; });
  pasteZone.addEventListener('dragleave', () => pasteZone.style.borderColor = 'rgba(110,231,183,0.25)');
  pasteZone.addEventListener('drop', (e) => {
    e.preventDefault();
    pasteZone.style.borderColor = 'rgba(110,231,183,0.25)';
    const text = e.dataTransfer.getData('text/plain') || e.dataTransfer.getData('text');
    if (text) pasteArea.value = text;
  });

  $('applePasteImport').addEventListener('click', () => {
    const body = pasteArea.value.trim();
    if (!body) { importStatus('Paste a note first.', false); return; }
    // Use first non-empty line as title if no explicit title given
    const firstLine = body.split('\n').find(l => l.trim()) || 'Apple Note';
    const title = pasteTitleInput.value.trim() || firstLine.slice(0, 60);
    const added = mergeNotes([{ title, body }]);
    if (added) {
      showNoteAcquiredAnim(title);
      pasteArea.value = '';
      pasteTitleInput.value = '';
    } else {
      importStatus('A note with that title already exists.', false);
    }
  });
  // Also import on Enter in the title field
  pasteTitleInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') $('applePasteImport').click(); });

  // Apple Notes — supports .txt export (File → Export as Text)
  // Each file becomes one note; filename becomes the title.
  $('importAppleBtn').addEventListener('click', () => $('importAppleFile').click());
  $('importAppleFile').addEventListener('change', (e) => {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    let done = 0;
    const incoming = [];
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        incoming.push({ title: file.name.replace(/\.(txt|html?)$/i, ''), body: ev.target.result });
        done++;
        if (done === files.length) {
          const added = mergeNotes(incoming);
          importStatus('Added ' + added + ' of ' + files.length + ' Apple Notes ✓', true);
        }
      };
      reader.readAsText(file);
    });
    e.target.value = '';
  });

  // Claude — conversations.json (download from claude.ai)
  // Format: [{uuid, name, created_at, chat_messages:[{sender,text}]}]
  $('importClaudeBtn').addEventListener('click', () => $('importClaudeFile').click());
  $('importClaudeFile').addEventListener('change', (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        const convs = Array.isArray(data) ? data : (data.conversations || [data]);
        const incoming = convs.map(c => {
          const title = c.name || c.title || ('Claude — ' + new Date(c.created_at || Date.now()).toLocaleDateString());
          const msgs = (c.chat_messages || c.messages || []);
          const body = msgs.map(m => {
            const sender = m.sender === 'human' || m.role === 'user' ? 'You' : 'Claude';
            const text = (typeof m.text === 'string' ? m.text : (m.content || '')).trim();
            return text ? sender + ': ' + text : null;
          }).filter(Boolean).join('\n\n');
          return { title, body };
        });
        const added = mergeNotes(incoming);
        importStatus('Added ' + added + ' Claude conversations ✓', true);
      } catch (err) { importStatus('Could not read Claude export: ' + err.message, false); }
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  // ChatGPT — conversations.json (download from Settings → Data controls → Export)
  // Format: [{id, title, create_time, mapping:{[id]:{message:{author:{role},content:{parts:[]}}}}}]
  $('importChatGPTBtn').addEventListener('click', () => $('importChatGPTFile').click());
  $('importChatGPTFile').addEventListener('change', (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        const convs = Array.isArray(data) ? data : [data];
        const incoming = convs.map(c => {
          const title = c.title || ('ChatGPT — ' + new Date((c.create_time || 0) * 1000).toLocaleDateString());
          const mapping = c.mapping || {};
          const msgs = Object.values(mapping)
            .filter(node => node.message && node.message.content)
            .sort((a, b) => (a.message.create_time || 0) - (b.message.create_time || 0));
          const body = msgs.map(node => {
            const role = (node.message.author || {}).role || '';
            const parts = (node.message.content.parts || []).filter(p => typeof p === 'string').join('');
            const sender = role === 'user' ? 'You' : 'ChatGPT';
            return parts.trim() ? sender + ': ' + parts.trim() : null;
          }).filter(Boolean).join('\n\n');
          return { title, body };
        });
        const added = mergeNotes(incoming);
        importStatus('Added ' + added + ' ChatGPT conversations ✓', true);
      } catch (err) { importStatus('Could not read ChatGPT export: ' + err.message, false); }
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  // ---- Note acquisition animation ----
  // Called with the note title whenever a note is successfully imported.
  // Plays a brief JARVIS-style "scanning + locking" sequence, then dismisses.
  function showNoteAcquiredAnim(title) {
    const overlay  = document.getElementById('nimOverlay');
    const titleEl  = document.getElementById('nimTitleDisplay');
    const statusEl = document.getElementById('nimStatus');
    const footerEl = document.getElementById('nimFooter');
    const arc      = document.getElementById('nimProgressArc');
    const leftEl   = document.getElementById('nimDataLeft');
    const rightEl  = document.getElementById('nimDataRight');

    // Reset state
    overlay.classList.remove('exiting');
    titleEl.classList.remove('show'); footerEl.classList.remove('show');
    titleEl.textContent = title.length > 40 ? title.slice(0, 38) + '…' : title;
    statusEl.textContent = 'SCANNING…';
    arc.style.transition = 'none';
    arc.style.strokeDashoffset = '670';

    // Generate tick marks around the ring
    const ticksG = document.getElementById('nimTicks');
    if (!ticksG.children.length) {
      for (let i = 0; i < 32; i++) {
        const a = (i / 32) * Math.PI * 2;
        const rInner = i % 4 === 0 ? 104 : 102;
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', 110 + Math.cos(a) * rInner); line.setAttribute('y1', 110 + Math.sin(a) * rInner);
        line.setAttribute('x2', 110 + Math.cos(a) * 108);     line.setAttribute('y2', 110 + Math.sin(a) * 108);
        line.setAttribute('class', 'nim-tick');
        ticksG.appendChild(line);
      }
    }

    // Live hex data stream — simulates reading the note's raw data
    const HEX = '0123456789ABCDEF';
    const rand16 = () => Array.from({length:4}, () => HEX[Math.floor(Math.random()*16)]).join('');
    function genStream() { return Array.from({length:8}, () => '0x'+rand16()+' '+rand16()).join('\n'); }
    leftEl.textContent = genStream(); rightEl.textContent = genStream();
    const streamTimer = setInterval(() => {
      const ll = leftEl.textContent.split('\n');
      ll[Math.floor(Math.random()*ll.length)] = '0x'+rand16()+' '+rand16();
      leftEl.textContent = ll.join('\n');
      const rl = rightEl.textContent.split('\n');
      rl[Math.floor(Math.random()*rl.length)] = '0x'+rand16()+' '+rand16();
      rightEl.textContent = rl.join('\n');
    }, 80);

    // Show the overlay
    overlay.style.display = 'flex';

    // After a brief scan delay, sweep the progress arc and lock on
    setTimeout(() => {
      arc.style.transition = 'stroke-dashoffset 0.65s cubic-bezier(0.25,0.8,0.25,1)';
      arc.style.strokeDashoffset = '27'; // ~96% filled = acquisition complete
    }, 120);

    // Reveal title (the "target is locked")
    setTimeout(() => {
      statusEl.textContent = '✓ NOTE ACQUIRED';
      titleEl.classList.add('show');
    }, 650);

    // Show the indexed/encrypted footer
    setTimeout(() => { footerEl.classList.add('show'); }, 950);

    // Dismiss
    setTimeout(() => {
      clearInterval(streamTimer);
      overlay.classList.add('exiting');
      setTimeout(() => {
        overlay.style.display = 'none';
        overlay.classList.remove('exiting');
        // Reset arc for next time
        arc.style.transition = 'none';
        arc.style.strokeDashoffset = '670';
      }, 380);
    }, 1800);
  }

  render();

  if (window.initCloudSync) {
    window.initCloudSync({ appKey: 'notes', syncedKeys: [STORE_KEY], onApplied: render });
  }

  // ---- Full-page drag-and-drop ----
  // Handles two cases:
  //   1. Dragging an actual note from Apple Notes sidebar → browser receives
  //      the note as a file (.enex XML, .txt, .rtf, .md, or .html).
  //   2. Dragging selected text from within a note → received as text/plain.
  // Both show the same overlay and create a note instantly on drop.

  // Parse Apple Notes' .enex XML format (also used by Evernote-compatible apps).
  // The note title is in <title>, content is HTML inside a <content> CDATA block.
  function parseEnex(xml) {
    const titleMatch = xml.match(/<title>([\s\S]*?)<\/title>/i);
    const contentMatch = xml.match(/<content>([\s\S]*?)<\/content>/i);
    const title = titleMatch ? titleMatch[1].replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').trim() : 'Apple Note';
    let body = '';
    if (contentMatch) {
      body = contentMatch[1]
        .replace(/<!\[CDATA\[([\s\S]*?)\]\]>/g, '$1') // unwrap CDATA
        .replace(/<br\s*\/?>/gi, '\n')
        .replace(/<\/p>/gi, '\n').replace(/<\/div>/gi, '\n').replace(/<\/li>/gi, '\n')
        .replace(/<li[^>]*>/gi, '• ')
        .replace(/<[^>]+>/g, '')            // strip remaining HTML tags
        .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&nbsp;/g,' ').replace(/&#39;/g,"'")
        .replace(/\n{3,}/g, '\n\n').trim();
    }
    return { title, body: body || title };
  }

  // Minimal RTF → plain text: strip RTF control words and group delimiters.
  function parseRtf(rtf) {
    const text = rtf
      .replace(/\{[^{}]*\}/g, '')          // remove groups like {\fonttbl...}
      .replace(/\\[a-z]+[-]?\d*[ ]?/g, '') // strip control words like \par \b0 etc
      .replace(/[{}\\]/g, '')
      .replace(/\n{3,}/g, '\n\n').trim();
    const lines = text.split('\n');
    return { title: (lines.find(l => l.trim()) || 'Dropped note').slice(0, 80), body: text };
  }

  function processDroppedText(text) {
    const lines = text.split('\n');
    const title = (lines.find(l => l.trim()) || 'Dropped note').slice(0, 80).trim();
    return { title, body: text.trim() };
  }

  function importFromNotes(incoming) {
    const added = mergeNotes(incoming);
    if (added > 0) {
      // Play the acquisition animation with the first imported note's title
      const firstTitle = (incoming[0] && incoming[0].title) || 'Note';
      showNoteAcquiredAnim(added > 1 ? added + ' notes' : firstTitle);
    } else {
      importStatus('Already exists — note with that title was skipped.', false);
    }
  }

  const overlay = document.getElementById('dropOverlay');
  let dragDepth = 0;

  document.addEventListener('dragenter', (e) => {
    if (!e.dataTransfer) return;
    const types = Array.from(e.dataTransfer.types || []);
    // Show for text drops OR file drops
    if (!types.includes('text/plain') && !types.includes('text') && !types.includes('Files')) return;
    dragDepth++;
    overlay.style.display = 'flex';
    overlay.style.pointerEvents = 'all';
  });

  document.addEventListener('dragleave', () => {
    dragDepth--;
    if (dragDepth <= 0) { dragDepth = 0; overlay.style.display = 'none'; overlay.style.pointerEvents = 'none'; }
  });

  document.addEventListener('dragover', (e) => { e.preventDefault(); });

  document.addEventListener('drop', (e) => {
    e.preventDefault();
    dragDepth = 0;
    overlay.style.display = 'none';
    overlay.style.pointerEvents = 'none';

    const files = e.dataTransfer.files;

    if (files && files.length > 0) {
      // ---- File drop (actual note dragged from Apple Notes sidebar) ----
      const incoming = [];
      let pending = files.length;
      Array.from(files).forEach(file => {
        const reader = new FileReader();
        reader.onload = (ev) => {
          const content = ev.target.result || '';
          const name = file.name.replace(/\.(enex|txt|rtf|md|html?)$/i, '');
          let parsed;
          if (/\.enex$/i.test(file.name)) {
            parsed = parseEnex(content);
          } else if (/\.rtf$/i.test(file.name)) {
            parsed = parseRtf(content);
            if (!parsed.title || parsed.title === 'Dropped note') parsed.title = name;
          } else {
            // .txt, .md, .html, or unknown — treat as plain text
            parsed = processDroppedText(content.replace(/<[^>]+>/g, ''));
            if (!parsed.title || parsed.title === 'Dropped note') parsed.title = name;
          }
          incoming.push(parsed);
          pending--;
          if (pending === 0) importFromNotes(incoming);
        };
        reader.readAsText(file);
      });
    } else {
      // ---- Text drop (selected text dragged from within a note) ----
      const text = e.dataTransfer.getData('text/plain') || e.dataTransfer.getData('text') || '';
      if (!text.trim()) return;
      importFromNotes([processDroppedText(text)]);
    }
  });
})();
</script>
</body>
</html>
