<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Notes · Dashboard</title>

<script src="sync.js"></script>
<script src="topbar.js" defer></script>

<style>
:root {
  --text-primary: #FAFAFA; --text-secondary: #B8B6B0; --text-tertiary: #76746E;
  --success: #6BE3A4; --warning: #F2C063; --danger: #FF6B6B;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0; background: #050506; color: var(--text-secondary);
  font-family: var(--font); -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
}
body { min-height: 100vh; position: relative; overflow-x: hidden; padding: max(28px, env(safe-area-inset-top)) 20px 60px; }
body::before {
  content: ''; position: fixed; inset: 0;
  background: radial-gradient(circle at 82% 14%, rgba(224,118,88,0.16), transparent 45%), radial-gradient(circle at 18% 90%, rgba(180,180,200,0.06), transparent 50%);
  filter: blur(40px); pointer-events: none; z-index: -2; animation: drift 36s ease-in-out infinite alternate;
}
body::after { content: ''; position: fixed; inset: 0; background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px); background-size: 3px 3px; pointer-events: none; z-index: -1; }
@keyframes drift { 0%{transform:translate3d(0,0,0)} 100%{transform:translate3d(-22px,14px,0)} }

.page { max-width: 760px; margin: 0 auto; }
.back-btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px 8px 10px; margin: 0 0 14px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 999px;
  color: var(--text-secondary); font-family: inherit; font-size: 12px; font-weight: 600; letter-spacing: 0.02em;
  text-decoration: none; -webkit-tap-highlight-color: transparent; transition: background 0.15s ease, color 0.15s ease;
}
.back-btn:hover, .back-btn:active { background: rgba(255,255,255,0.07); color: var(--text-primary); }
.dash-title { margin: 0 0 14px; font-size: 28px; font-weight: 700; letter-spacing: -0.025em; background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent; }
@media (max-width: 480px) { .dash-title { font-size: 22px; } }

.gm-card { position: relative; background: rgba(255,255,255,0.04); border-radius: 16px; padding: 20px; margin-bottom: 14px; backdrop-filter: blur(24px) saturate(1.2); -webkit-backdrop-filter: blur(24px) saturate(1.2); box-shadow: 0 12px 40px rgba(0,0,0,0.45); }

.notes-toolbar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.notes-import-btn { padding: 7px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.10); background: rgba(255,255,255,0.04); color: var(--text-secondary); font-family: inherit; font-size: 11.5px; font-weight: 700; cursor: pointer; }
.notes-import-btn:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }
.notes-search { flex: 1; min-width: 140px; padding: 11px 14px; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; background: rgba(0,0,0,0.28); color: var(--text-primary); font-family: inherit; font-size: 14px; outline: none; }
.notes-search::placeholder { color: var(--text-tertiary); }
.notes-search:focus { border-color: rgba(255,255,255,0.28); }
.notes-new {
  padding: 11px 18px; border: 0; border-radius: 12px; background: linear-gradient(180deg, #FFFFFF 0%, #E8E5DD 100%);
  color: #0A0A0B; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 2px 8px rgba(0,0,0,0.35);
}
.notes-new:hover { filter: brightness(1.06); }

.note-card { padding: 16px; margin-bottom: 10px; background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; cursor: pointer; transition: background 0.15s, border-color 0.15s; }
.note-card:hover { background: rgba(255,255,255,0.055); border-color: rgba(255,255,255,0.12); }
.note-card.pinned { border-color: rgba(242,192,99,0.35); }
.note-row-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 4px; }
.note-title { font-size: 15px; font-weight: 700; color: var(--text-primary); word-break: break-word; }
.note-title:empty::before { content: 'Untitled note'; color: var(--text-tertiary); font-weight: 500; }
.note-pin { border: 0; background: transparent; color: var(--text-tertiary); font-size: 15px; cursor: pointer; flex-shrink: 0; opacity: 0.5; }
.note-pin.on { opacity: 1; color: var(--warning); }
.note-snippet { font-size: 12.5px; color: var(--text-tertiary); line-height: 1.45; white-space: pre-wrap; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.note-meta { font-size: 10.5px; color: var(--text-tertiary); margin-top: 8px; letter-spacing: 0.03em; }
.empty-state { text-align: center; font-size: 12px; font-style: italic; color: var(--text-tertiary); padding: 30px 0; }

.note-modal-bg { position: fixed; inset: 0; z-index: 200; display: none; align-items: flex-start; justify-content: center; padding: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(6px); }
.note-modal-bg.show { display: flex; }
.note-modal { width: 100%; max-width: 760px; min-height: 100vh; background: #0A0A0B; padding: max(20px, env(safe-area-inset-top)) 20px 40px; }
.note-modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 10px; }
.note-modal-btn { border: 0; background: transparent; color: var(--text-secondary); font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; padding: 8px 10px; }
.note-modal-btn:hover { color: var(--text-primary); }
.note-modal-btn.danger:hover { color: var(--danger); }
.note-title-input { width: 100%; border: 0; background: transparent; color: var(--text-primary); font-family: inherit; font-size: 22px; font-weight: 700; outline: none; margin-bottom: 12px; }
.note-title-input::placeholder { color: var(--text-tertiary); }
.note-body-input { width: 100%; min-height: 60vh; border: 0; background: transparent; color: var(--text-secondary); font-family: inherit; font-size: 15px; line-height: 1.6; outline: none; resize: none; }
.note-body-input::placeholder { color: var(--text-tertiary); }
.note-fmt-bar { display: flex; gap: 6px; margin: 8px 0 4px; }
.note-fmt-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 7px; color: var(--text-secondary); font-size: 14px; padding: 3px 9px; cursor: pointer; line-height: 1.5; }
.note-fmt-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }

/* ===== Source badges on note cards ===== */
.note-source-badge {
  font-size: 9.5px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
  padding: 2px 7px; border-radius: 999px; flex-shrink: 0; white-space: nowrap;
}
.note-source-badge.src-overseer { background: rgba(107,227,164,0.14); color: #6BE3A4; }
.note-source-badge.src-claude    { background: rgba(242,192,99,0.14);  color: #F2C063; }
.note-source-badge.src-chatgpt   { background: rgba(125,211,252,0.14); color: #7DD3FC; }
.note-source-badge.src-apple     { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.45); }
.note-source-badge.src-imported  { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.3); }
.note-card.is-native { border-color: rgba(107,227,164,0.2); }

/* ===== Folder strip ===== */
.notes-folders-wrap { position: relative; margin-bottom: 12px; }
.notes-folders {
  display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px;
  scrollbar-width: none; -ms-overflow-style: none;
}
.notes-folders::-webkit-scrollbar { display: none; }
.folder-pill {
  display: inline-flex; align-items: center; gap: 5px; flex-shrink: 0;
  padding: 6px 13px; border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.04);
  color: var(--text-secondary); font-family: inherit; font-size: 12px; font-weight: 600;
  cursor: pointer; transition: background 0.15s, color 0.15s, border-color 0.15s;
  -webkit-tap-highlight-color: transparent; white-space: nowrap;
}
.folder-pill:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }
.folder-pill.active { background: rgba(255,255,255,0.10); color: var(--text-primary); border-color: rgba(255,255,255,0.22); }
.folder-pill .folder-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.folder-pill-add { border-style: dashed; color: var(--text-tertiary); }
.folder-pill-add:hover { color: var(--success); border-color: rgba(107,227,164,0.4); }
.folder-count { font-size: 10px; color: var(--text-tertiary); margin-left: 2px; font-weight: 500; }

/* ===== Sort controls ===== */
.notes-sort-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 6px; flex-wrap: wrap; }
.notes-sort-label { font-size: 10px; font-weight: 700; letter-spacing: 0.10em; text-transform: uppercase; color: var(--text-tertiary); flex-shrink: 0; }
.notes-sort-seg { display: flex; gap: 3px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 3px; flex: 1; min-width: 0; }
.sort-btn { padding: 5px 10px; border: none; background: transparent; border-radius: 7px; color: var(--text-tertiary); font-family: inherit; font-size: 11px; font-weight: 600; cursor: pointer; transition: 0.15s; white-space: nowrap; flex: 1; }
.sort-btn.active { background: rgba(255,255,255,0.10); color: var(--text-primary); }
.sort-btn.active::after { content: attr(data-dir); margin-left: 3px; opacity: 0.65; font-size: 10px; }
.sort-btn:hover:not(.active) { color: var(--text-secondary); }
/* Native-notes position toggle */
.sort-native-btn {
  flex-shrink: 0; padding: 5px 10px; border-radius: 8px; font-size: 10.5px; font-weight: 700;
  border: 1px solid rgba(107,227,164,0.25); background: rgba(107,227,164,0.07); color: #6BE3A4;
  font-family: inherit; cursor: pointer; transition: 0.15s; white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}
.sort-native-btn.bottom { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.10); color: var(--text-tertiary); }

/* ===== Category pill on note card ===== */
.note-cat-pill {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.04em;
  padding: 2px 7px; border-radius: 999px; flex-shrink: 0;
  opacity: 0.85;
}
.note-cat-dot { width: 6px; height: 6px; border-radius: 50%; }
.note-meta-row { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; gap: 8px; }

/* ===== Category picker row in note modal ===== */
.note-cat-row {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  padding: 8px 0 10px; border-bottom: 1px solid rgba(255,255,255,0.06); margin-bottom: 10px;
}
.note-cat-btn {
  display: inline-flex; align-items: center; gap: 5px; padding: 5px 11px; border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.10); background: rgba(255,255,255,0.04);
  color: var(--text-secondary); font-family: inherit; font-size: 11.5px; font-weight: 600; cursor: pointer;
  transition: 0.15s; -webkit-tap-highlight-color: transparent;
}
.note-cat-btn.active { border-color: rgba(255,255,255,0.25); color: var(--text-primary); background: rgba(255,255,255,0.08); }
.note-cat-btn:hover:not(.active) { background: rgba(255,255,255,0.07); }
.note-cat-none { color: var(--text-tertiary); }

/* ===== Folder management modal ===== */
.folder-modal-bg { display: none; position: fixed; inset: 0; z-index: 400; background: rgba(0,0,0,0.65); backdrop-filter: blur(8px); align-items: center; justify-content: center; padding: 24px; }
.folder-modal-bg.show { display: flex; }
.folder-modal { width: 100%; max-width: 420px; background: #111113; border: 1px solid rgba(255,255,255,0.12); border-radius: 18px; padding: 22px; max-height: 80vh; overflow-y: auto; }
.folder-modal h3 { margin: 0 0 16px; font-size: 16px; font-weight: 700; color: var(--text-primary); }
.folder-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 14px; }
.folder-edit-row { display: flex; align-items: center; gap: 8px; }
.folder-color-btn { width: 24px; height: 24px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.15); cursor: pointer; flex-shrink: 0; outline: none; }
.folder-edit-row input { flex: 1; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.10); border-radius: 9px; color: var(--text-primary); font-family: inherit; font-size: 13px; padding: 8px 11px; outline: none; }
.folder-edit-row input:focus { border-color: rgba(255,255,255,0.28); }
.folder-del-btn { background: transparent; border: none; color: var(--text-tertiary); font-size: 18px; cursor: pointer; padding: 4px 8px; -webkit-tap-highlight-color: transparent; }
.folder-del-btn:hover { color: var(--danger); }
.folder-add-btn { width: 100%; padding: 10px; background: rgba(255,255,255,0.04); border: 1px dashed rgba(255,255,255,0.12); border-radius: 10px; color: var(--text-secondary); font-family: inherit; font-size: 12.5px; cursor: pointer; margin-bottom: 14px; }
.folder-add-btn:hover { background: rgba(255,255,255,0.07); color: var(--text-primary); }
.color-swatch-row { display: flex; gap: 8px; flex-wrap: wrap; margin: 6px 0 10px; }
.color-swatch { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border-color 0.12s; }
.color-swatch.selected { border-color: #fff; }
.folder-modal-actions { display: flex; gap: 8px; }
.fma-cancel { flex: 1; padding: 11px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.10); border-radius: 11px; color: var(--text-secondary); font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; }
.fma-save { flex: 1; padding: 11px; background: linear-gradient(180deg,#fff,#e8e5dd); border: none; border-radius: 11px; color: #0a0a0b; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; }

@media (max-width: 480px) { body { padding: max(20px, env(safe-area-inset-top)) 14px 50px; } .gm-card { padding: 16px; } .folder-modal-bg { padding: 14px; } }

/* ===== Note import animation — JARVIS acquisition sequence ===== */
@keyframes nimFadeIn  { from { opacity: 0; } to   { opacity: 1; } }
@keyframes nimFadeOut { from { opacity: 1; } to   { opacity: 0; } }
@keyframes nimSpin    { to   { transform: rotate(360deg);  } }
@keyframes nimSpinRev { to   { transform: rotate(-360deg); } }
@keyframes nimPulse   { 0%,100% { opacity: 0.12; } 50% { opacity: 0.28; } }
@keyframes nimScanline {
  0%   { transform: translateY(-2px); opacity: 0; }
  5%   { opacity: 1; }
  95%  { opacity: 0.7; }
  100% { transform: translateY(100vh); opacity: 0; }
}

.nim-overlay {
  position: fixed; inset: 0; z-index: 9999;
  display: none; flex-direction: column; align-items: center; justify-content: center;
  gap: 12px; padding: 24px;
  background: radial-gradient(ellipse 70% 55% at 50% 48%, #061009 0%, #020402 55%, #010201 100%);
}
.nim-overlay.show { display: flex; animation: nimFadeIn 0.22s ease both; }
.nim-overlay.exiting { animation: nimFadeOut 0.35s ease both; }

/* Dot grid + scanline via pseudo-elements — completely non-interactive, no layout impact */
.nim-overlay::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background-image: radial-gradient(rgba(110,231,183,0.055) 1px, transparent 1px);
  background-size: 26px 26px;
}
.nim-overlay::after {
  content: ''; position: absolute; left: 0; right: 0; top: 0; height: 1.5px; pointer-events: none;
  background: linear-gradient(90deg, transparent, rgba(103,232,249,0.5) 40%, rgba(110,231,183,0.9) 50%, rgba(103,232,249,0.5) 60%, transparent);
  animation: nimScanline 1.2s linear infinite;
}

/* Ring SVG — overflow hidden so SVG content stays inside the container */
.nim-rings-wrap { position: relative; width: min(200px, 52vw); height: min(200px, 52vw); flex-shrink: 0; }
.nim-svg { width: 100%; height: 100%; overflow: hidden; display: block; }
.nim-ring { fill: none; transform-origin: 100px 100px; }
.nim-r-outer { stroke: #6EE7B7; stroke-width: 1;   stroke-dasharray: 3 9;       opacity: 0.45; animation: nimSpin    12s linear infinite; }
.nim-r-mid   { stroke: #67E8F9; stroke-width: 1.8; stroke-dasharray: 22 6 3 6;  opacity: 0.7;  animation: nimSpinRev  7s linear infinite; }
.nim-r-inner { stroke: #6EE7B7; stroke-width: 1;   stroke-dasharray: 1.5 5;    opacity: 0.45; animation: nimSpin    4.5s linear infinite; }

/* Progress arc — sweeps from 0 → ~96% via JS stroke-dashoffset transition */
.nim-progress {
  fill: none; stroke: #6EE7B7; stroke-width: 1.5; opacity: 0.7;
  stroke-dasharray: 610; stroke-dashoffset: 610;
  transform: rotate(-90deg); transform-origin: 100px 100px;
  transition: stroke-dashoffset 0.75s cubic-bezier(0.25,0.8,0.25,1);
}

/* Radar sweep — just a line, no stroke-width hacks */
.nim-sweep { stroke: #67E8F9; stroke-width: 1.5; transform-origin: 100px 100px; animation: nimSpin 1.8s linear infinite; }

/* Sweep trail — filled wedge at low opacity (NOT a stroke) */
.nim-sweep-trail { fill: rgba(103,232,249,0.07); transform-origin: 100px 100px; animation: nimSpin 1.8s linear infinite; }

.nim-core-glow { fill: #6EE7B7; animation: nimPulse 1.4s ease-in-out infinite; }
.nim-core      { fill: #020404; stroke: #6EE7B7; stroke-width: 1.3; }
.nim-hex       { fill: none; stroke: #67E8F9; stroke-width: 0.8; opacity: 0.6; transform-origin: 100px 100px; animation: nimSpinRev 20s linear infinite; }
.nim-tick      { stroke: #6EE7B7; stroke-width: 1; opacity: 0.25; }
.nim-orbital   { fill: #67E8F9; opacity: 0.85; transform-origin: 100px 100px; animation: nimSpin 4s linear infinite; }

/* Text — all constrained, centered, no overflow */
.nim-label {
  font: 700 9px/1 ui-monospace, monospace;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: rgba(110,231,183,0.4); text-align: center;
}
.nim-status {
  font: 700 11px/1 ui-monospace, monospace;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: #8eeebf; text-align: center; min-height: 16px;
}
.nim-title {
  font: 700 clamp(13px,3.5vw,18px)/1.2 -apple-system, sans-serif;
  color: #eafff6; text-align: center;
  text-shadow: 0 0 18px rgba(110,231,183,0.65);
  opacity: 0; transition: opacity 0.4s ease 0.5s;
  max-width: min(300px, 82vw);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.nim-title.show { opacity: 1; }
.nim-footer {
  font: 9px/1 ui-monospace, monospace;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: rgba(110,231,183,0.25); text-align: center;
  opacity: 0; transition: opacity 0.3s ease 0.85s;
}
.nim-footer.show { opacity: 1; }
</style>
</head>
<body>
<!-- Note import acquisition animation — clean flex column, no absolute children -->
<div class="nim-overlay" id="nimOverlay">

  <div class="nim-label">OVERSEER · NOTE CAPTURE</div>

  <div class="nim-rings-wrap">
    <!-- SVG viewBox 200×200, overflow hidden — nothing paints outside this box -->
    <svg class="nim-svg" viewBox="0 0 200 200">
      <!-- Tick marks (JS-generated) -->
      <g id="nimTicks"></g>
      <!-- Sweep trail: filled wedge at low opacity — correct approach, no huge stroke -->
      <path class="nim-sweep-trail" d="M100 100 L100 5 A95 95 0 0 1 195 100 Z"/>
      <!-- Outer progress arc -->
      <circle class="nim-progress" id="nimProgressArc" cx="100" cy="100" r="97"/>
      <!-- Three concentric rings -->
      <circle class="nim-ring nim-r-outer" cx="100" cy="100" r="90"/>
      <!-- Radar sweep line -->
      <line class="nim-sweep" x1="100" y1="100" x2="100" y2="10"/>
      <circle class="nim-ring nim-r-mid"   cx="100" cy="100" r="68"/>
      <!-- Crosshairs -->
      <line stroke="rgba(110,231,183,0.3)" stroke-width="0.7" x1="38" y1="100" x2="62" y2="100"/>
      <line stroke="rgba(110,231,183,0.3)" stroke-width="0.7" x1="138" y1="100" x2="162" y2="100"/>
      <line stroke="rgba(110,231,183,0.3)" stroke-width="0.7" x1="100" y1="38" x2="100" y2="62"/>
      <line stroke="rgba(110,231,183,0.3)" stroke-width="0.7" x1="100" y1="138" x2="100" y2="162"/>
      <!-- Corner brackets -->
      <path d="M52 68 L52 52 L68 52" fill="none" stroke="#6EE7B7" stroke-width="1.4" opacity="0.55"/>
      <path d="M148 68 L148 52 L132 52" fill="none" stroke="#6EE7B7" stroke-width="1.4" opacity="0.55"/>
      <path d="M52 132 L52 148 L68 148" fill="none" stroke="#6EE7B7" stroke-width="1.4" opacity="0.55"/>
      <path d="M148 132 L148 148 L132 148" fill="none" stroke="#6EE7B7" stroke-width="1.4" opacity="0.55"/>
      <!-- Inner ring + orbital -->
      <circle class="nim-ring nim-r-inner" cx="100" cy="100" r="45"/>
      <circle class="nim-orbital" cx="100" cy="10" r="2.2"/>
      <!-- Core -->
      <circle class="nim-core-glow" cx="100" cy="100" r="22"/>
      <circle class="nim-core" cx="100" cy="100" r="14"/>
      <polygon class="nim-hex" points="100,88 110,94 110,106 100,112 90,106 90,94"/>
      <circle cx="100" cy="100" r="2.2" fill="#67E8F9"/>
    </svg>
  </div>

<script>
(function () {
  'use strict';
  const $ = (id) => document.getElementById(id);
  const STORE_KEY = 'notes:items';
  const CAT_KEY   = 'notes:categories';   // separate from brain.html (uses 'brain:*' keys)

  // ── Storage ───────────────────────────────────────────────────
  function load()  { try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; } catch { return []; } }
  function save(items) { localStorage.setItem(STORE_KEY, JSON.stringify(items)); }
  function loadCats()  { try { return JSON.parse(localStorage.getItem(CAT_KEY))  || []; } catch { return []; } }
  function saveCats(cats) { localStorage.setItem(CAT_KEY, JSON.stringify(cats)); }

  // ── UI state ──────────────────────────────────────────────────
  let activeId    = null;
  let saveT       = null;
  let activeFolder = null;    // null = All Notes, else category id
  let sortMode    = 'edited'; // 'edited' | 'imported' | 'created' | 'az'
  let sortDir     = 'desc';   // 'desc' = newest/A first | 'asc' = oldest/Z first
  let nativePos   = 'top';    // 'top' = app-created float above imports | 'bottom' = no float

  // Preset color palette for folders
  const CAT_COLORS = ['#6BE3A4','#7DD3FC','#F2C063','#FF8A8A','#C9B8FF','#67E8F9','#FCA5A5','#86EFAC'];

  // ── Helpers ───────────────────────────────────────────────────
  function escapeHtml(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function fmtDate(ts) {
    const d = new Date(ts);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' · ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  }
  function getCat(id) { return loadCats().find(c => c.id === id) || null; }

  // ── Folder strip ──────────────────────────────────────────────
  function renderFolders() {
    const cats = loadCats();
    const items = load();
    const countAll = items.length;
    const countFor = id => items.filter(n => n.category === id).length;
    const strip = $('notesFolders');
    let html = `<button class="folder-pill${activeFolder === null ? ' active' : ''}" data-folder="__all__">All <span class="folder-count">${countAll}</span></button>`;
    cats.forEach(c => {
      const n = countFor(c.id);
      html += `<button class="folder-pill${activeFolder === c.id ? ' active' : ''}" data-folder="${escapeHtml(c.id)}">
        <span class="folder-dot" style="background:${escapeHtml(c.color)}"></span>${escapeHtml(c.name)}<span class="folder-count">${n}</span>
      </button>`;
    });
    html += `<button class="folder-pill folder-pill-add" id="folderManageBtn">⊕ Manage</button>`;
    strip.innerHTML = html;
    strip.querySelectorAll('.folder-pill[data-folder]').forEach(btn => {
      btn.addEventListener('click', () => {
        activeFolder = btn.dataset.folder === '__all__' ? null : btn.dataset.folder;
        renderFolders(); render();
      });
    });
    const manBtn = $('folderManageBtn');
    if (manBtn) manBtn.addEventListener('click', openFolderModal);
  }

  // ── Sort control wiring ───────────────────────────────────────
  function updateSortBtnUI() {
    const dirLabel = { desc: '↓', asc: '↑' };
    document.querySelectorAll('.sort-btn').forEach(b => {
      const isActive = b.dataset.sort === sortMode;
      b.classList.toggle('active', isActive);
      // data-dir drives the ::after pseudo-element arrow
      b.setAttribute('data-dir', isActive ? dirLabel[sortDir] : '');
    });
    const nb = $('sortNativeBtn');
    if (nb) {
      nb.textContent = nativePos === 'top' ? '✏ top' : '✏ bottom';
      nb.classList.toggle('bottom', nativePos === 'bottom');
      nb.title = nativePos === 'top' ? 'App-created notes shown at top — click to move to bottom' : 'App-created notes at bottom — click to move to top';
    }
  }

  document.querySelectorAll('.sort-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.sort === sortMode) {
        // Same button → toggle direction
        sortDir = sortDir === 'desc' ? 'asc' : 'desc';
      } else {
        sortMode = btn.dataset.sort;
        sortDir  = 'desc'; // reset direction when switching mode
      }
      updateSortBtnUI();
      render();
    });
  });

  const sortNativeBtn = $('sortNativeBtn');
  if (sortNativeBtn) {
    sortNativeBtn.addEventListener('click', () => {
      nativePos = nativePos === 'top' ? 'bottom' : 'top';
      updateSortBtnUI();
      render();
    });
  }

  updateSortBtnUI(); // set initial arrow state

  // ── Main render ───────────────────────────────────────────────
  function render() {
    const list = $('notesList');
    if (!list) return; // safety guard

    try {
      const q = ($('notesSearch') || {}).value ? $('notesSearch').value.trim().toLowerCase() : '';
      let items = load();

      // Cache categories once per render — getCat was calling loadCats() per note
      const cats = loadCats();
      const catById = {};
      cats.forEach(c => { catById[c.id] = c; });

      // Folder filter
      if (activeFolder !== null) items = items.filter(n => n.category === activeFolder);

      // Search filter — only check title for performance with large notes
      if (q) items = items.filter(n =>
        (n.title || '').toLowerCase().includes(q) ||
        (n.body || '').slice(0, 500).toLowerCase().includes(q)
      );

      // Sort — pinned first, then optional native float, then by chosen mode + direction
      const isNative = n => n.source === 'overseer';
      const dir = sortDir === 'asc' ? 1 : -1; // desc = -1 (bigger values first), asc = +1
      items.sort((a, b) => {
        // Pinned always at very top regardless of direction
        if (!!b.pinned !== !!a.pinned) return b.pinned ? 1 : -1;
        // Native notes float to top OR bottom based on nativePos
        if (nativePos !== 'off' && isNative(b) !== isNative(a)) {
          return nativePos === 'top' ? (isNative(b) ? 1 : -1) : (isNative(a) ? 1 : -1);
        }
        // Primary sort key
        if (sortMode === 'imported' || sortMode === 'created') {
          return dir * ((a.createdAt || a.updatedAt || 0) - (b.createdAt || b.updatedAt || 0));
        }
        if (sortMode === 'az') {
          return dir * (a.title || '').localeCompare(b.title || '');
        }
        // 'edited' (default)
        return dir * ((a.updatedAt || 0) - (b.updatedAt || 0));
      });

      if (!items.length) {
        list.innerHTML = '<div class="empty-state">' + (q ? 'No notes match "' + escapeHtml(q) + '".' : activeFolder ? 'No notes in this folder yet.' : 'No notes yet — tap "+ New note" to start.') + '</div>';
        return;
      }

      // Source badge labels and CSS classes
      const SRC_LABEL = { overseer: '✏ Created', claude: 'Claude', chatgpt: 'ChatGPT', apple: 'Apple Notes', imported: 'Imported' };
      const SRC_CLASS = { overseer: 'src-overseer', claude: 'src-claude', chatgpt: 'src-chatgpt', apple: 'src-apple', imported: 'src-imported' };

      const html = items.map(n => {
        const cat = n.category ? catById[n.category] : null;
        const catPill = cat
          ? '<span class="note-cat-pill" style="background:' + escapeHtml(cat.color) + '22;color:' + escapeHtml(cat.color) + '"><span class="note-cat-dot" style="background:' + escapeHtml(cat.color) + '"></span>' + escapeHtml(cat.name) + '</span>'
          : '';
        // Date label — for "imported"/"created" show import/creation date, else edit date
        const showImportDate = sortMode === 'imported' || sortMode === 'created';
        const ts  = showImportDate ? (n.createdAt || n.updatedAt || 0) : (n.updatedAt || 0);
        const meta = ts ? fmtDate(ts) : '—';
        const dirArrow = sortDir === 'asc' ? ' ↑' : '';
        const prefix = showImportDate ? (isNative(n) ? 'Created ' : 'Imported ') + dirArrow : 'Edited ' + dirArrow;
        // Source badge — show for all notes; created-in-app gets a distinct highlighted style
        const src = n.source || 'imported';
        const srcBadge = '<span class="note-source-badge ' + (SRC_CLASS[src] || 'src-imported') + '">' + (SRC_LABEL[src] || 'Imported') + '</span>';
        return '<div class="note-card' + (n.pinned ? ' pinned' : '') + (isNative(n) ? ' is-native' : '') + '" data-id="' + escapeHtml(String(n.id)) + '">' +
          '<div class="note-row-top"><div class="note-title">' + escapeHtml(n.title || '') + '</div>' +
            (n.pinned ? '<span class="note-pin on">📌</span>' : '') +
          '</div>' +
          '<div class="note-snippet">' + escapeHtml((n.body || '').slice(0, 160)) + '</div>' +
          '<div class="note-meta-row"><span class="note-meta">' + prefix + meta + '</span>' + srcBadge + catPill + '</div>' +
        '</div>';
      }).join('');

      list.innerHTML = html;
      list.querySelectorAll('.note-card').forEach(c => c.addEventListener('click', () => openNote(c.dataset.id)));
    } catch (err) {
      console.error('[Notes] render() failed:', err);
      list.innerHTML = '<div class="empty-state">Error loading notes — check console.</div>';
    }
  }

  // ── Note modal ────────────────────────────────────────────────
  function renderCatPicker() {
    const items = load();
    const n = items.find(x => x.id === activeId);
    if (!n) return;
    const cats = loadCats();
    let html = '<span style="font-size:11px;color:var(--text-tertiary);font-weight:700;letter-spacing:0.08em;text-transform:uppercase;flex-shrink:0">Folder</span>';
    html += `<button class="note-cat-btn note-cat-none${!n.category ? ' active' : ''}" data-catid="">None</button>`;
    cats.forEach(c => {
      html += `<button class="note-cat-btn${n.category === c.id ? ' active' : ''}" data-catid="${escapeHtml(c.id)}" style="${n.category === c.id ? 'background:' + c.color + '22;border-color:' + c.color + '55;color:' + c.color : ''}">
        <span class="folder-dot" style="background:${escapeHtml(c.color)};width:8px;height:8px;border-radius:50%;display:inline-block"></span>${escapeHtml(c.name)}
      </button>`;
    });
    const row = $('noteCatRow');
    row.innerHTML = html;
    row.querySelectorAll('.note-cat-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const items2 = load();
        const n2 = items2.find(x => x.id === activeId);
        if (!n2) return;
        n2.category = btn.dataset.catid || null;
        save(items2);
        renderCatPicker();
        renderFolders();
      });
    });
  }

  function openNote(id) {
    const items = load();
    const n = items.find(x => x.id === id);
    if (!n) return;
    activeId = id;
    $('noteTitleInput').value = n.title || '';
    $('noteBodyInput').value  = n.body  || '';
    $('notePin').classList.toggle('on', !!n.pinned);
    renderCatPicker();
    $('noteModalBg').classList.add('show');
    setTimeout(() => $('noteTitleInput').focus(), 50);
  }
  function newNote() {
    const items = load();
    const now = Date.now();
    const n = { id: 'n_' + now, title: '', body: '', pinned: false, source: 'overseer', category: activeFolder || null, createdAt: now, updatedAt: now };
    items.unshift(n);
    save(items);
    openNote(n.id);
  }
  function persistActive() {
    if (!activeId) return;
    const items = load();
    const n = items.find(x => x.id === activeId);
    if (!n) return;
    n.title = $('noteTitleInput').value;
    n.body  = $('noteBodyInput').value;
    n.updatedAt = Date.now();
    if (!n.createdAt) n.createdAt = n.updatedAt; // backfill for old notes
    save(items);
  }
  function closeNote() {
    persistActive();
    const items = load();
    const n = items.find(x => x.id === activeId);
    if (n && !n.title.trim() && !n.body.trim()) save(items.filter(x => x.id !== activeId));
    activeId = null;
    $('noteModalBg').classList.remove('show');
    renderFolders();
    render();
  }

  $('notesNew').addEventListener('click', newNote);
  $('notesSearch').addEventListener('input', render);
  $('noteClose').addEventListener('click', closeNote);
  $('notePin').addEventListener('click', () => {
    const items = load(); const n = items.find(x => x.id === activeId); if (!n) return;
    n.pinned = !n.pinned; n.updatedAt = Date.now(); save(items);
    $('notePin').classList.toggle('on', n.pinned);
  });
  $('noteDelete').addEventListener('click', () => {
    if (!activeId) return;
    save(load().filter(x => x.id !== activeId));
    activeId = null; $('noteModalBg').classList.remove('show');
    renderFolders(); render();
  });
  [$('noteTitleInput'), $('noteBodyInput')].forEach(el => {
    el.addEventListener('input', () => { clearTimeout(saveT); saveT = setTimeout(persistActive, 400); });
  });

  // ── Bullet list button ────────────────────────────────────────
  $('fmtBullet').addEventListener('click', () => {
    const ta = $('noteBodyInput');
    const val = ta.value;
    const start = ta.selectionStart;
    const end   = ta.selectionEnd;
    // Expand selection to full line boundaries
    const lineStart = val.lastIndexOf('\n', start - 1) + 1;
    const afterEnd  = end === start ? val.indexOf('\n', end) : val.indexOf('\n', end - 1);
    const lineEnd   = afterEnd === -1 ? val.length : afterEnd;
    const block     = val.slice(lineStart, lineEnd);
    const lines     = block.split('\n');
    const allOn     = lines.every(l => l === '' || l.startsWith('• '));
    const newLines  = lines.map(l => {
      if (l === '') return l;
      return allOn ? (l.startsWith('• ') ? l.slice(2) : l) : (l.startsWith('• ') ? l : '• ' + l);
    });
    const replacement = newLines.join('\n');
    ta.setRangeText(replacement, lineStart, lineEnd, 'select');
    ta.focus();
    clearTimeout(saveT); saveT = setTimeout(persistActive, 400);
  });

  // Auto-continue bullet on Enter
  $('noteBodyInput').addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    const bod = $('noteBodyInput');
    const pos = bod.selectionStart;
    const val = bod.value;
    const lineStart = val.lastIndexOf('\n', pos - 1) + 1;
    const line = val.slice(lineStart, pos);
    if (line.startsWith('• ')) {
      if (line === '• ') {
        // Empty bullet — remove it and stop
        e.preventDefault();
        bod.setRangeText('', lineStart, pos, 'end');
      } else {
        e.preventDefault();
        bod.setRangeText('\n• ', pos, pos, 'end');
      }
      clearTimeout(saveT); saveT = setTimeout(persistActive, 400);
    }
  });

  // ── Folder management modal ───────────────────────────────────
  let draftCats = [];   // working copy while modal is open

  function openFolderModal() {
    draftCats = loadCats().map(c => ({ ...c }));
    renderFolderList();
    $('folderModalBg').classList.add('show');
  }
  function renderFolderList() {
    const list = $('folderList');
    list.innerHTML = draftCats.map((c, i) => `
      <div class="folder-edit-row" data-i="${i}">
        <button class="folder-color-btn" data-i="${i}" style="background:${escapeHtml(c.color)}" title="Change color"></button>
        <input type="text" value="${escapeHtml(c.name)}" placeholder="Folder name" data-i="${i}">
        <button class="folder-del-btn" data-i="${i}" title="Delete folder">×</button>
      </div>`).join('');

    // Color pickers
    list.querySelectorAll('.folder-color-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const i = parseInt(btn.dataset.i, 10);
        showColorPicker(i, btn);
      });
    });
    // Name edits
    list.querySelectorAll('input').forEach(inp => {
      inp.addEventListener('input', () => { draftCats[parseInt(inp.dataset.i, 10)].name = inp.value; });
    });
    // Delete
    list.querySelectorAll('.folder-del-btn').forEach(btn => {
      btn.addEventListener('click', () => { draftCats.splice(parseInt(btn.dataset.i, 10), 1); renderFolderList(); });
    });
  }

  function showColorPicker(i, anchorBtn) {
    // Remove existing picker
    document.querySelectorAll('.color-swatch-row').forEach(el => el.remove());
    const row = document.createElement('div');
    row.className = 'color-swatch-row';
    CAT_COLORS.forEach(col => {
      const s = document.createElement('button');
      s.className = 'color-swatch' + (draftCats[i].color === col ? ' selected' : '');
      s.style.background = col;
      s.title = col;
      s.addEventListener('click', () => {
        draftCats[i].color = col;
        anchorBtn.style.background = col;
        row.remove();
      });
      row.appendChild(s);
    });
    anchorBtn.closest('.folder-edit-row').after(row);
  }

  $('folderAddBtn').addEventListener('click', () => {
    const nextColor = CAT_COLORS[draftCats.length % CAT_COLORS.length];
    draftCats.push({ id: 'cat_' + Date.now() + '_' + Math.random().toString(36).slice(2), name: '', color: nextColor });
    renderFolderList();
    // Focus the new input
    const inputs = $('folderList').querySelectorAll('input');
    if (inputs.length) inputs[inputs.length - 1].focus();
  });
  $('folderModalCancel').addEventListener('click', () => { $('folderModalBg').classList.remove('show'); });
  $('folderModalSave').addEventListener('click', () => {
    const valid = draftCats.filter(c => c.name.trim());
    // If the active folder was deleted, reset to All
    if (activeFolder && !valid.find(c => c.id === activeFolder)) activeFolder = null;
    saveCats(valid);
    $('folderModalBg').classList.remove('show');
    renderFolders(); render();
  });

  // ── Auto-organize with Claude ─────────────────────────────────
  $('autoOrganizeBtn').addEventListener('click', async () => {
    const items = load().filter(n => n.title || n.body);
    if (items.length < 2) { showAutoStatus('Need at least 2 notes to organize.', false); return; }

    const btn = $('autoOrganizeBtn');
    btn.disabled = true; btn.textContent = '⏳ Organizing…';
    showAutoStatus('', false);

    // Prepare a compact note list for Claude (title + first 120 chars of body)
    const noteList = items.slice(0, 80).map((n, i) =>
      `${i}: "${(n.title || 'Untitled').slice(0, 60)}" — ${(n.body || '').slice(0, 120).replace(/\n/g, ' ')}`
    ).join('\n');

    try {
      const res = await fetch('/api/notes-organize', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-App-Secret': window.DASH_APP_SECRET || '' },
        body: JSON.stringify({ notes: noteList }),
      });

      if (!res.ok) throw new Error('API error ' + res.status);
      const parsed = await res.json(); // endpoint returns {folders, assignments} directly

      // Create the suggested folders (merge with existing, don't duplicate by name)
      const existing = loadCats();
      const existingNames = new Set(existing.map(c => c.name.toLowerCase()));
      const newFolders = (parsed.folders || []).filter(f => !existingNames.has((f.name || '').toLowerCase()));
      const allFolders = [
        ...existing,
        ...newFolders.map(f => ({ id: 'cat_' + Date.now() + '_' + Math.random().toString(36).slice(2), name: f.name, color: f.color || '#6BE3A4' })),
      ];
      saveCats(allFolders);

      // Assign notes
      const noteItems = load();
      const folderByName = {};
      allFolders.forEach(f => { folderByName[f.name.toLowerCase()] = f.id; });
      const assignments = parsed.assignments || {};
      let changed = 0;
      items.forEach((n, i) => {
        const folderName = assignments[String(i)];
        if (!folderName) return;
        const folderId = folderByName[folderName.toLowerCase()];
        if (!folderId) return;
        const noteItem = noteItems.find(x => x.id === n.id);
        if (noteItem && noteItem.category !== folderId) { noteItem.category = folderId; changed++; }
      });
      save(noteItems);

      showAutoStatus(`✓ Created ${newFolders.length} folder${newFolders.length !== 1 ? 's' : ''}, assigned ${changed} note${changed !== 1 ? 's' : ''}.`, true);
      renderFolders(); render();
    } catch (e) {
      showAutoStatus('Auto-organize failed: ' + (e.message || e), false);
    }
    btn.disabled = false; btn.textContent = '✦ Auto-organize';
  });

  function showAutoStatus(msg, ok) {
    const el = $('autoOrganizeStatus');
    el.textContent = msg; el.style.display = msg ? 'block' : 'none';
    el.style.color = ok ? '#6BE3A4' : '#FF8A8A';
    if (ok) setTimeout(() => { el.style.display = 'none'; }, 4000);
  }

  // ---- Multi-source import ----
  // Each source exports in a very different format; we normalize each
  // to {title, body} then merge with existing notes, deduplicating by title.
  function importStatus(msg, ok) {
    const el = $('importStatus');
    el.textContent = msg;
    el.style.color = ok ? '#6BE3A4' : '#FF8A8A';
    if (ok) setTimeout(() => { el.textContent = ''; }, 3000);
  }
  function mergeNotes(incoming, defaultSource) {
    const existing = load();
    const titles = new Set(existing.map(n => (n.title || '').toLowerCase().trim()));
    let added = 0;
    incoming.forEach(({ title, body, category, source }) => {
      const t = (title || '').trim() || 'Imported note';
      if (titles.has(t.toLowerCase())) return;
      const now = Date.now();
      existing.unshift({ id: 'n_' + now + '_' + Math.random().toString(36).slice(2), title: t, body: (body || '').trim(), pinned: false, source: source || defaultSource || 'imported', category: category || activeFolder || null, createdAt: now, updatedAt: now });
      titles.add(t.toLowerCase());
      added++;
    });
    save(existing);
    renderFolders(); render();
    return added;
  }

  // ---- Apple Notes quick paste (no export needed) ----
  // The paste zone accepts text pasted or dragged directly from Apple Notes.
  // User flow: open note → Cmd+A → Cmd+C → click textarea → Cmd+V → Import.
  const pasteZone = $('applePasteZone');
  const pasteArea = $('applePasteArea');
  const pasteTitleInput = $('applePasteTitle');

  // Highlight border when focused
  pasteArea.addEventListener('focus', () => pasteZone.style.borderColor = 'rgba(110,231,183,0.6)');
  pasteArea.addEventListener('blur', () => pasteZone.style.borderColor = 'rgba(110,231,183,0.25)');

  // Drag-and-drop text from Apple Notes
  pasteZone.addEventListener('dragover', (e) => { e.preventDefault(); pasteZone.style.borderColor = 'rgba(110,231,183,0.8)'; });
  pasteZone.addEventListener('dragleave', () => pasteZone.style.borderColor = 'rgba(110,231,183,0.25)');
  pasteZone.addEventListener('drop', (e) => {
    e.preventDefault();
    pasteZone.style.borderColor = 'rgba(110,231,183,0.25)';
    const text = e.dataTransfer.getData('text/plain') || e.dataTransfer.getData('text');
    if (text) pasteArea.value = text;
  });

  $('applePasteImport').addEventListener('click', () => {
    const body = pasteArea.value.trim();
    if (!body) { importStatus('Paste a note first.', false); return; }
    // Use first non-empty line as title if no explicit title given
    const firstLine = body.split('\n').find(l => l.trim()) || 'Apple Note';
    const title = pasteTitleInput.value.trim() || firstLine.slice(0, 60);
    const added = mergeNotes([{ title, body }], 'apple');
    if (added) {
      showNoteAcquiredAnim(title);
      pasteArea.value = '';
      pasteTitleInput.value = '';
    } else {
      importStatus('A note with that title already exists.', false);
    }
  });
  // Also import on Enter in the title field
  pasteTitleInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') $('applePasteImport').click(); });

  // Apple Notes — supports .txt export (File → Export as Text)
  // Each file becomes one note; filename becomes the title.
  $('importAppleBtn').addEventListener('click', () => $('importAppleFile').click());
  $('importAppleFile').addEventListener('change', (e) => {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    let done = 0;
    const incoming = [];
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        incoming.push({ title: file.name.replace(/\.(txt|html?)$/i, ''), body: ev.target.result });
        done++;
        if (done === files.length) {
          const added = mergeNotes(incoming, 'apple');
          importStatus('Added ' + added + ' of ' + files.length + ' Apple Notes ✓', true);
        }
      };
      reader.readAsText(file);
    });
    e.target.value = '';
  });

  // Claude — conversations.json (download from claude.ai)
  // Format: [{uuid, name, created_at, chat_messages:[{sender,text}]}]
  $('importClaudeBtn').addEventListener('click', () => $('importClaudeFile').click());
  $('importClaudeFile').addEventListener('change', (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        const convs = Array.isArray(data) ? data : (data.conversations || [data]);
        const incoming = convs.map(c => {
          const title = c.name || c.title || ('Claude — ' + new Date(c.created_at || Date.now()).toLocaleDateString());
          const msgs = (c.chat_messages || c.messages || []);
          const body = msgs.map(m => {
            const sender = m.sender === 'human' || m.role === 'user' ? 'You' : 'Claude';
            const text = (typeof m.text === 'string' ? m.text : (m.content || '')).trim();
            return text ? sender + ': ' + text : null;
          }).filter(Boolean).join('\n\n');
          return { title, body };
        });
        const added = mergeNotes(incoming, 'claude');
        importStatus('Added ' + added + ' Claude conversations ✓', true);
      } catch (err) { importStatus('Could not read Claude export: ' + err.message, false); }
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  // ChatGPT — conversations.json (download from Settings → Data controls → Export)
  // Format: [{id, title, create_time, mapping:{[id]:{message:{author:{role},content:{parts:[]}}}}}]
  $('importChatGPTBtn').addEventListener('click', () => $('importChatGPTFile').click());
  $('importChatGPTFile').addEventListener('change', (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        const convs = Array.isArray(data) ? data : [data];
        const incoming = convs.map(c => {
          const title = c.title || ('ChatGPT — ' + new Date((c.create_time || 0) * 1000).toLocaleDateString());
          const mapping = c.mapping || {};
          const msgs = Object.values(mapping)
            .filter(node => node.message && node.message.content)
            .sort((a, b) => (a.message.create_time || 0) - (b.message.create_time || 0));
          const body = msgs.map(node => {
            const role = (node.message.author || {}).role || '';
            const parts = (node.message.content.parts || []).filter(p => typeof p === 'string').join('');
            const sender = role === 'user' ? 'You' : 'ChatGPT';
            return parts.trim() ? sender + ': ' + parts.trim() : null;
          }).filter(Boolean).join('\n\n');
          return { title, body };
        });
        const added = mergeNotes(incoming, 'chatgpt');
        importStatus('Added ' + added + ' ChatGPT conversations ✓', true);
      } catch (err) { importStatus('Could not read ChatGPT export: ' + err.message, false); }
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  // ---- Note acquisition animation ----
  // Called with the note title whenever a note is successfully imported.
  // Plays a brief JARVIS-style "scanning + locking" sequence, then dismisses.
  function showNoteAcquiredAnim(title) {
    const overlay  = document.getElementById('nimOverlay');
    const titleEl  = document.getElementById('nimTitleDisplay');
    const statusEl = document.getElementById('nimStatus');
    const footerEl = document.getElementById('nimFooter');
    const arc      = document.getElementById('nimProgressArc');

    // Reset — remove classes, reset arc, clear text states
    overlay.classList.remove('exiting', 'show');
    titleEl.classList.remove('show'); footerEl.classList.remove('show');
    titleEl.textContent = title.length > 36 ? title.slice(0, 34) + '…' : title;
    statusEl.textContent = 'SCANNING…';
    arc.style.transition = 'none';
    arc.style.strokeDashoffset = '610'; // matches CSS stroke-dasharray: 610

    // Generate tick marks once (32 marks around the ring at r=97)
    const ticksG = document.getElementById('nimTicks');
    if (!ticksG.children.length) {
      for (let i = 0; i < 32; i++) {
        const a = (i / 32) * Math.PI * 2, cx = 100, cy = 100;
        const rI = 93, rO = i % 4 === 0 ? 98 : 96;
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', cx + Math.cos(a) * rI);
        line.setAttribute('y1', cy + Math.sin(a) * rI);
        line.setAttribute('x2', cx + Math.cos(a) * rO);
        line.setAttribute('y2', cy + Math.sin(a) * rO);
        line.setAttribute('class', 'nim-tick');
        ticksG.appendChild(line);
      }
    }

    // Show overlay (class triggers the CSS fade-in animation)
    overlay.classList.add('show');

    // Sweep progress arc after a short scan pause
    setTimeout(() => {
      arc.style.transition = 'stroke-dashoffset 0.7s cubic-bezier(0.25,0.8,0.25,1)';
      arc.style.strokeDashoffset = '24'; // ~96% filled
    }, 130);

    // Lock on: flip status + reveal title
    setTimeout(() => {
      statusEl.textContent = '✓ NOTE ACQUIRED';
      titleEl.classList.add('show');
    }, 660);

    // Footer
    setTimeout(() => { footerEl.classList.add('show'); }, 960);

    // Dismiss
    setTimeout(() => {
      overlay.classList.remove('show');
      overlay.classList.add('exiting');
      setTimeout(() => {
        overlay.classList.remove('exiting');
        arc.style.transition = 'none';
        arc.style.strokeDashoffset = '610';
      }, 380);
    }, 1850);
  }

  // Backfill createdAt on existing notes in the background after first render
  function backfillCreatedAt() {
    try {
      const items = load();
      let dirty = false;
      items.forEach(n => { if (!n.createdAt) { n.createdAt = n.updatedAt || Date.now(); dirty = true; } });
      if (dirty) save(items);
    } catch (e) {}
  }

  // Render immediately — no rAF deferral (silent failures inside rAF are hard to debug)
  renderFolders();
  render();
  setTimeout(backfillCreatedAt, 500);

  if (window.initCloudSync) {
    window.initCloudSync({ appKey: 'notes', syncedKeys: [STORE_KEY, CAT_KEY], onApplied: () => { renderFolders(); render(); } });
  }

  // ---- Full-page drag-and-drop ----
  // Handles two cases:
  //   1. Dragging an actual note from Apple Notes sidebar → browser receives
  //      the note as a file (.enex XML, .txt, .rtf, .md, or .html).
  //   2. Dragging selected text from within a note → received as text/plain.
  // Both show the same overlay and create a note instantly on drop.

  // Parse Apple Notes' .enex XML format (also used by Evernote-compatible apps).
  // The note title is in <title>, content is HTML inside a <content> CDATA block.
  function parseEnex(xml) {
    const titleMatch = xml.match(/<title>([\s\S]*?)<\/title>/i);
    const contentMatch = xml.match(/<content>([\s\S]*?)<\/content>/i);
    const title = titleMatch ? titleMatch[1].replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').trim() : 'Apple Note';
    let body = '';
    if (contentMatch) {
      body = contentMatch[1]
        .replace(/<!\[CDATA\[([\s\S]*?)\]\]>/g, '$1') // unwrap CDATA
        .replace(/<br\s*\/?>/gi, '\n')
        .replace(/<\/p>/gi, '\n').replace(/<\/div>/gi, '\n').replace(/<\/li>/gi, '\n')
        .replace(/<li[^>]*>/gi, '• ')
        .replace(/<[^>]+>/g, '')            // strip remaining HTML tags
        .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&nbsp;/g,' ').replace(/&#39;/g,"'")
        .replace(/\n{3,}/g, '\n\n').trim();
    }
    return { title, body: body || title };
  }

  // Minimal RTF → plain text: strip RTF control words and group delimiters.
  function parseRtf(rtf) {
    const text = rtf
      .replace(/\{[^{}]*\}/g, '')          // remove groups like {\fonttbl...}
      .replace(/\\[a-z]+[-]?\d*[ ]?/g, '') // strip control words like \par \b0 etc
      .replace(/[{}\\]/g, '')
      .replace(/\n{3,}/g, '\n\n').trim();
    const lines = text.split('\n');
    return { title: (lines.find(l => l.trim()) || 'Dropped note').slice(0, 80), body: text };
  }

  function processDroppedText(text) {
    const lines = text.split('\n');
    const title = (lines.find(l => l.trim()) || 'Dropped note').slice(0, 80).trim();
    return { title, body: text.trim() };
  }

  function importFromNotes(incoming) {
    const added = mergeNotes(incoming, 'apple'); // drag-and-drop from Apple Notes / files
    if (added > 0) {
      // Play the acquisition animation with the first imported note's title
      const firstTitle = (incoming[0] && incoming[0].title) || 'Note';
      showNoteAcquiredAnim(added > 1 ? added + ' notes' : firstTitle);
    } else {
      importStatus('Already exists — note with that title was skipped.', false);
    }
  }

  const overlay = document.getElementById('dropOverlay');
  let dragDepth = 0;

  document.addEventListener('dragenter', (e) => {
    if (!e.dataTransfer) return;
    const types = Array.from(e.dataTransfer.types || []);
    // Show for text drops OR file drops
    if (!types.includes('text/plain') && !types.includes('text') && !types.includes('Files')) return;
    dragDepth++;
    overlay.style.display = 'flex';
    overlay.style.pointerEvents = 'all';
  });

  document.addEventListener('dragleave', () => {
    dragDepth--;
    if (dragDepth <= 0) { dragDepth = 0; overlay.style.display = 'none'; overlay.style.pointerEvents = 'none'; }
  });

  document.addEventListener('dragover', (e) => { e.preventDefault(); });

  document.addEventListener('drop', (e) => {
    e.preventDefault();
    dragDepth = 0;
    overlay.style.display = 'none';
    overlay.style.pointerEvents = 'none';

    const files = e.dataTransfer.files;

    if (files && files.length > 0) {
      // ---- File drop (actual note dragged from Apple Notes sidebar) ----
      const incoming = [];
      let pending = files.length;
      Array.from(files).forEach(file => {
        const reader = new FileReader();
        reader.onload = (ev) => {
          const content = ev.target.result || '';
          const name = file.name.replace(/\.(enex|txt|rtf|md|html?)$/i, '');
          let parsed;
          if (/\.enex$/i.test(file.name)) {
            parsed = parseEnex(content);
          } else if (/\.rtf$/i.test(file.name)) {
            parsed = parseRtf(content);
            if (!parsed.title || parsed.title === 'Dropped note') parsed.title = name;
          } else {
            // .txt, .md, .html, or unknown — treat as plain text
            parsed = processDroppedText(content.replace(/<[^>]+>/g, ''));
            if (!parsed.title || parsed.title === 'Dropped note') parsed.title = name;
          }
          incoming.push(parsed);
          pending--;
          if (pending === 0) importFromNotes(incoming);
        };
        reader.readAsText(file);
      });
    } else {
      // ---- Text drop (selected text dragged from within a note) ----
      const text = e.dataTransfer.getData('text/plain') || e.dataTransfer.getData('text') || '';
      if (!text.trim()) return;
      importFromNotes([processDroppedText(text)]);
    }
  });
})();
</script>
</body>
</html>
