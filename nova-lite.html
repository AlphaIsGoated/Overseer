<!DOCTYPE html>
<html lang="en">
<head>
<script src="/api/config"></script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nova Lite · AI Mentor</title>
<!-- ============================================================
 * NOVA LITE — a simple AI mentor for the dashboard.
 *
 * HOW IT WORKS:
 *   • Nova reads whatever the dashboard saved in localStorage for context.
 *   • Calls the serverless /api/ai/ai-chat proxy, which holds the Anthropic
 *     key server-side (ANTHROPIC_API_KEY in Vercel) — no key to paste,
 *     and it works the same on every device since nothing is per-browser.
 *
 * This is the lightweight version: a flat CSS orb (no 3D), basic chat.
 * ============================================================ -->
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --accent: #6EE7B7; --accent-2: #67E8F9; --bg: #05060c; --fg: #e9ecf5; --muted: rgba(233,236,245,.55); --line: rgba(255,255,255,.1); }
html, body { background: var(--bg); }
body { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; color: var(--fg); min-height: 100vh; }

.wrap { max-width: 560px; margin: 0 auto; padding: 28px 18px 60px; }
.back-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px 8px 10px; margin: 0 0 18px;
  background: rgba(255,255,255,.04); border: 1px solid var(--line); border-radius: 999px;
  color: var(--muted); font-family: inherit; font-size: 12px; font-weight: 600; letter-spacing: .02em;
  text-decoration: none; -webkit-tap-highlight-color: transparent; transition: background .15s ease, color .15s ease; }
.back-btn:hover, .back-btn:active { background: rgba(255,255,255,.07); color: var(--fg); }
.back-btn svg { display: block; }
.top { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }

/* ---- flat CSS orb avatar (lightweight, no Three.js) ---- */
.orb { width: 60px; height: 60px; border-radius: 50%; position: relative; flex-shrink: 0;
  background: radial-gradient(circle at 32% 28%, #eafff6, var(--accent) 42%, #1f8f66 100%);
  box-shadow: 0 0 22px -2px var(--accent), inset 0 -6px 14px rgba(0,0,0,.25);
  animation: orbFloat 4s ease-in-out infinite; }
.orb::before, .orb::after { content: ''; position: absolute; top: 38%; width: 9px; height: 9px; border-radius: 50%;
  background: #06281d; box-shadow: 0 0 6px rgba(0,0,0,.4); transition: height .15s; }
.orb::before { left: 30%; } .orb::after { right: 30%; }
.orb.think { animation: orbFloat 1.1s ease-in-out infinite, orbPulse 1.1s ease-in-out infinite; }
.orb.happy::before, .orb.happy::after { height: 4px; border-radius: 0 0 9px 9px; }
@keyframes orbFloat { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-6px) } }
@keyframes orbPulse { 0%,100% { box-shadow: 0 0 22px -2px var(--accent) } 50% { box-shadow: 0 0 34px 2px var(--accent) } }

.title { min-width: 0; }
.title h1 { font-family: 'Times New Roman', Georgia, serif; font-style: italic; font-size: 26px; font-weight: 500;
  background: linear-gradient(90deg, var(--accent-2), var(--accent)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.title .role { font-family: ui-monospace, monospace; font-size: 10px; letter-spacing: .24em; text-transform: uppercase; color: var(--muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ---- chat ---- */
.feed { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
.msg { max-width: 90%; }
.msg.user { align-self: flex-end; }
.msg.coach { align-self: flex-start; width: 100%; }
.bubble { border-radius: 14px; padding: 13px 15px; font-size: 14.5px; line-height: 1.55; }
.msg.user .bubble { background: rgba(255,255,255,.05); border: 1px solid var(--line); }
.msg.coach .bubble { background: rgba(255,255,255,.04); border: 1px solid color-mix(in srgb, var(--accent) 40%, transparent); border-left: 3px solid var(--accent); }
.tag { display: inline-block; margin-bottom: 9px; font-family: ui-monospace, monospace; font-size: 9.5px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #04140d; background: var(--accent); padding: 3px 9px; border-radius: 999px; }
.bubble b, .pill { color: var(--accent); font-weight: 700; }
.pill { background: color-mix(in srgb, var(--accent) 18%, transparent); padding: 1px 7px; border-radius: 6px; font-weight: 600; }
.reply-list { margin: 6px 0 0; padding-left: 18px; display: grid; gap: 6px; }
.reply-list li { line-height: 1.45; }
.dots { display: inline-flex; gap: 5px; } .dots i { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); opacity: .4; animation: d 1.2s ease-in-out infinite; }
.dots i:nth-child(2){animation-delay:.2s} .dots i:nth-child(3){animation-delay:.4s}
@keyframes d { 0%,100%{opacity:.35;transform:scale(1)} 50%{opacity:1;transform:scale(1.4)} }

.composer { display: flex; gap: 9px; }
.composer input { flex: 1; min-width: 0; background: rgba(255,255,255,.03); border: 1px solid var(--line); color: var(--fg); border-radius: 12px; padding: 13px 15px; font-size: 14.5px; outline: none; }
.composer input:focus { border-color: var(--accent); }
.composer button { width: 50px; flex-shrink: 0; border: 0; border-radius: 12px; cursor: pointer; color: #04140d; background: var(--accent); font-size: 18px; }
.composer button:active { transform: scale(.94); }
.composer button#mic { background: rgba(255,255,255,.05); color: var(--fg); border: 1px solid var(--line); }
.composer button#mic.listening { background: var(--accent); color: #04140d; }
.top-spacer { flex: 1; }
.voice-toggle { width: 34px; height: 34px; flex-shrink: 0; border-radius: 10px; border: 1px solid var(--line); background: rgba(255,255,255,.04); color: var(--fg); cursor: pointer; font-size: 15px; opacity: .55; }
.voice-toggle.on { opacity: 1; background: color-mix(in srgb, var(--accent) 20%, transparent); border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
  <div class="wrap">
    <a href="index.html" class="back-btn" aria-label="Back to dashboard">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
      <span>Back</span>
    </a>
    <div class="top">
      <div class="orb" id="orb"></div>
      <div class="title"><h1>Nova Lite</h1><div class="role">your mentor</div></div>
      <div class="top-spacer"></div>
      <button class="voice-toggle" id="voiceToggle" type="button" title="Read replies aloud" aria-label="Toggle spoken replies">🔊</button>
    </div>

    <div class="feed" id="feed"></div>

    <div class="composer">
      <input id="chatInput" placeholder="ask Nova anything…" autocomplete="off" />
      <button id="mic" type="button" aria-label="Speak your question">🎙️</button>
      <button id="send" aria-label="Send">→</button>
    </div>
  </div>

<script>
(function(){
  const feed = document.getElementById('feed');
  const input = document.getElementById('chatInput');
  const orb = document.getElementById('orb');

  function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  function setOrb(s){ orb.className = 'orb' + (s ? ' ' + s : ''); }

  // ---- read whatever the dashboard stored (for context) ----
  function dashboardData(){
    const SKIP = new Set([
      'strava_tokens_v1','whoop_tokens_v1','google_accounts_v1','brain:obs_creds',
      'canvas_creds_v1','apiusage:log','data-theme','coach_voice_on','nova_voice_on',
      'settings:budget_alerted','settings:conservation_mode','settings:model',
      'settings:theme','settings:monthly_budget',
      'google_last_sync','canvas_last_sync','strava_last_sync','whoop_last_sync',
      'finance_active_tab','po_coach_units_migrated_lb_v1','po_coach_workout_done',
      'wish-hero-pct-num',
    ]);
    const SKIP_PFX = ['photo_','google_tokens','tpl:','coach_proactive'];
    const now = Date.now(), WINDOW = 35 * 86400000;
    const out = {};
    for (let i = 0; i < localStorage.length; i++){
      const k = localStorage.key(i);
      if (SKIP.has(k) || SKIP_PFX.some(p => k.startsWith(p))) continue;
      let v;
      try { v = JSON.parse(localStorage.getItem(k)); } catch(_){ v = localStorage.getItem(k); }
      if (typeof v === 'string' && v.startsWith('data:')) continue;
      if (k === 'marathon_plan_v1' && v && Array.isArray(v.entries)) {
        out[k] = { ...v, entries: v.entries
          .filter(e => Math.abs(new Date(e.date+'T00:00').getTime() - now) < WINDOW)
          .map(e => ({ date:e.date, type:e.type, label:e.label,
            plannedDistanceMi:e.plannedDistanceMi, completed:e.completed,
            actualDistanceMi:e.actualDistanceMi })) };
      } else if (k === 'notes:items' && Array.isArray(v)) {
        out[k] = v.slice(0,25).map(n => ({ title:n.title, category:n.category, body:(n.body||'').slice(0,150), pinned:n.pinned }));
      } else if (k === 'brain:obs_notes' && Array.isArray(v)) {
        out[k] = v.slice(0,12).map(n => ({ path:n.path, body:(n.body||'').slice(0,80) }));
      } else if (k === 'strava_activities_v1' && Array.isArray(v)) {
        out[k] = v.slice(-15).map(a => ({ name:a.name, type:a.type, date:a.date, distanceMi:a.distanceMi, durationMin:a.movingSec ? Math.round(a.movingSec/60) : null, paceMinPerMi:a.paceSecPerMi ? (a.paceSecPerMi/60).toFixed(2) : null }));
      } else if (k === 'google_calendars_v3' && v && typeof v === 'object') {
        const slim = {}; for (const id of Object.keys(v)) slim[id] = { name:v[id].name, color:v[id].color, enabled:v[id].enabled }; out[k] = slim;
      } else if (k === 'internship:opportunities' && Array.isArray(v)) {
        out[k] = v.slice(0,20).map(o => ({ company:o.company, role:o.role, status:o.status, deadline:o.deadline }));
      } else if (k === 'nw:history' && Array.isArray(v)) {
        out[k] = v.slice(-6);
      } else if (k === 'po_coach_weights' && Array.isArray(v)) {
        out[k] = v.slice(-20);
      } else if ((k === 'po_coach_photos' || k === 'po_coach_inbody') && v) {
        out[k] = '[photos omitted for size]';
      } else if (typeof v === 'string' && v.length > 4000) {
        out[k] = v.slice(0,400) + '…';
      } else {
        out[k] = v;
      }
    }
    let json = JSON.stringify(out);
    if (json.length > 40000) {
      const bySize = Object.keys(out).sort((a,b) => JSON.stringify(out[b]).length - JSON.stringify(out[a]).length);
      for (const k of bySize) { out[k] = '[trimmed]'; json = JSON.stringify(out); if (json.length <= 40000) break; }
    }
    return out;
  }

  // ---- render: bullets + **pills** ----
  function inlineMarks(s){ return esc(s).replace(/\*\*(.+?)\*\*/g, '<span class="pill">$1</span>'); }
  function render(text){
    const lines = String(text).split(/\r?\n/).map(l => l.trim()).filter(Boolean);
    const items = [], loose = [];
    for (const l of lines){
      if (/^[-•*]\s+/.test(l)) items.push('<li>' + inlineMarks(l.replace(/^[-•*]\s+/, '')) + '</li>');
      else loose.push(inlineMarks(l));
    }
    let html = loose.join('<br>');
    if (items.length) html += (html ? '<br>' : '') + '<ul class="reply-list">' + items.join('') + '</ul>';
    return html;
  }
  // ── Chat history persistence ──────────────────────────────────
  const NOVA_HIST_KEY = 'nova_chat_history';
  const NOVA_MAX_SAVED = 60;
  const NOVA_MAX_CTX   = 20;
  const novaHistory = []; // sent to API for context

  function novaPersist(role, text) {
    try {
      const arr = JSON.parse(localStorage.getItem(NOVA_HIST_KEY) || '[]');
      arr.push({ role, text, ts: Date.now() });
      if (arr.length > NOVA_MAX_SAVED) arr.splice(0, arr.length - NOVA_MAX_SAVED);
      localStorage.setItem(NOVA_HIST_KEY, JSON.stringify(arr));
    } catch (e) {}
  }

  function addUser(t, save){
    const e = document.createElement('div');
    e.className = 'msg user';
    e.innerHTML = '<div class="bubble">' + esc(t) + '</div>';
    feed.appendChild(e); scroll();
    if (save !== false) novaPersist('user', t);
  }
  function addCoach(html, rawText, save){
    const e = document.createElement('div');
    e.className = 'msg coach';
    e.innerHTML = '<div class="bubble"><span class="tag">Nova</span><div>' + html + '</div></div>';
    feed.appendChild(e); scroll();
    if (save !== false && rawText != null) novaPersist('coach', rawText);
    return e;
  }
  function scroll(){ window.scrollTo(0, document.body.scrollHeight); }

  // Restore saved history on load
  (function loadNovaHistory() {
    try {
      const arr = JSON.parse(localStorage.getItem(NOVA_HIST_KEY) || '[]');
      arr.forEach(m => {
        if (m.role === 'user') {
          addUser(m.text, false);
          novaHistory.push({ role: 'user', content: m.text });
        } else {
          addCoach(render(m.text), null, false);
          novaHistory.push({ role: 'assistant', content: m.text });
        }
      });
      if (novaHistory.length > NOVA_MAX_CTX) novaHistory.splice(0, novaHistory.length - NOVA_MAX_CTX);
    } catch (e) {}
  })();

  const SYS =
    "You are Nova, a sophisticated AI system integrated into the user's personal life-tracking dashboard. " +
    "You have access to their complete data: fitness, nutrition, runs, finance, sleep, goals, and more. " +
    "Respond with professionalism and precision — be direct, data-driven, and authoritative. " +
    "Speak formally, like a capable assistant who commands respect. " +
    "Format replies as concise bullet points starting with '- '. Wrap key numbers and terms in **double asterisks**. " +
    "End with one '- Recommendation:' bullet giving the single most important action. " +
    "Never repeat prior statements. Build naturally on conversation history. " +
    "Dashboard data as JSON:\n";

  let busy = false;
  async function ask(text){
    text = (text||'').trim(); if (!text || busy) return;
    busy = true;
    addUser(text);  // persists
    input.value = '';
    setOrb('think');
    const loading = addCoach('<span class="dots"><i></i><i></i><i></i></span>', null, false);
    try {
      const msgs = [...novaHistory, { role: 'user', content: text }];
      const res = await fetch('/api/ai/ai-chat', {
        method: 'POST',
        headers: { 'content-type': 'application/json', 'x-app-secret': (window.DASH_APP_SECRET || '') },
        body: JSON.stringify({
          system: SYS + JSON.stringify(dashboardData()),
          model: window.getPreferredModel ? window.getPreferredModel() : 'claude-opus-4-8',
          messages: msgs,
        }),
      });
      if (window.logApiUsage) window.logApiUsage(res.headers.get('X-Usage-Input-Tokens'), res.headers.get('X-Usage-Output-Tokens'), res.headers.get('X-Usage-Model'), 'nova');
      const json = await res.json();
      if (!res.ok || json.error){
        loading.querySelector('div:last-child').innerHTML = render('- ' + (json.error || 'Something went wrong.'));
        setOrb(''); busy = false; return;
      }
      const reply = json.text || 'Hmm, no reply.';
      loading.querySelector('div:last-child').innerHTML = render(reply);
      // Update persisted element to final reply
      novaPersist('coach', reply);
      // Keep AI context trimmed
      novaHistory.push({ role: 'user', content: text });
      novaHistory.push({ role: 'assistant', content: reply });
      if (novaHistory.length > NOVA_MAX_CTX) novaHistory.splice(0, novaHistory.length - NOVA_MAX_CTX);
      setOrb('happy'); setTimeout(() => setOrb(''), 2500);
      speakReply(reply);
    } catch(e){
      loading.querySelector('div:last-child').innerHTML = render('- Could not reach Nova — check your connection.');
      setOrb('');
    }
    busy = false;
  }

  // Pre-unlock Audio element on first gesture so iOS autoplay works after async gaps.
  let _novaVoiceEl = null;
  function unlockAudio() {
    if (_novaVoiceEl) return;
    try {
      _novaVoiceEl = new Audio();
      _novaVoiceEl.src = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=';
      _novaVoiceEl.volume = 0;
      _novaVoiceEl.play().then(() => { _novaVoiceEl.pause(); _novaVoiceEl.volume = 1; }).catch(() => {});
    } catch (_) {}
  }

  document.getElementById('send').addEventListener('click', () => { unlockAudio(); ask(input.value); });
  input.addEventListener('keydown', e => { if (e.key === 'Enter') { unlockAudio(); ask(input.value); } });

  // ---- Voice: speak replies aloud via ElevenLabs (or Web Speech fallback) ----
  let voiceOn = false;
  const voiceToggle = document.getElementById('voiceToggle');
  try { voiceOn = localStorage.getItem('nova_voice_on') === '1'; } catch (e) {}
  voiceToggle.classList.toggle('on', voiceOn);
  voiceToggle.addEventListener('click', () => {
    unlockAudio();
    voiceOn = !voiceOn;
    voiceToggle.classList.toggle('on', voiceOn);
    try { localStorage.setItem('nova_voice_on', voiceOn ? '1' : '0'); } catch (e) {}
    if (voiceOn) {
      // Immediately re-speak the last Nova reply so voice feels instant.
      const msgs = feed.querySelectorAll('.msg.coach .bubble div');
      const last = msgs[msgs.length - 1];
      if (last) speakReply(last.textContent);
    } else {
      if (_novaVoiceEl) { _novaVoiceEl.pause(); _novaVoiceEl.src = ''; }
      if (window.speechSynthesis) window.speechSynthesis.cancel();
    }
  });
  function speakReply(text) {
    if (!voiceOn || !text) return;
    const clean = text.replace(/\*\*/g, '').replace(/^[-•*]\s+/gm, '').trim();
    if (!clean) return;
    if (window.DASH_ELEVENLABS_ENABLED) {
      if (window.speechSynthesis) window.speechSynthesis.cancel();
      fetch('/api/elevenlabs-tts', {
        method: 'POST',
        headers: { 'content-type': 'application/json', 'x-app-secret': (window.DASH_APP_SECRET || '') },
        body: JSON.stringify({ text: clean }),
      }).then(r => {
        if (!r.ok) return r.json().catch(() => ({})).then(b => { throw new Error(b.error || ('ElevenLabs ' + r.status)); });
        return r.arrayBuffer();
      }).then(buf => {
        if (!buf || !voiceOn) return;
        const blob = new Blob([buf], { type: 'audio/mpeg' });
        const url = URL.createObjectURL(blob);
        const cleanup = () => URL.revokeObjectURL(url);
        if (_novaVoiceEl) {
          _novaVoiceEl.pause();
          _novaVoiceEl.src = url;
          _novaVoiceEl.volume = 1;
          _novaVoiceEl.onended = cleanup;
          _novaVoiceEl.play().catch(err => { cleanup(); addNovaError('Voice error: ' + err.message); });
        } else {
          const a = new Audio(url);
          a.onended = cleanup;
          a.play().catch(err => { cleanup(); addNovaError('Voice error: ' + err.message); });
        }
      }).catch(err => addNovaError('Voice error: ' + err.message));
      return;
    }
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(clean);
    u.rate = 0.95;
    u.pitch = 0.85;
    u.lang = 'en-GB';
    // prefer a deep British male voice if available
    const voices = window.speechSynthesis.getVoices();
    const preferred = voices.find(v => v.lang === 'en-GB' && /male|daniel|george|oliver|arthur/i.test(v.name))
                   || voices.find(v => v.lang === 'en-GB')
                   || voices.find(v => /daniel|george/i.test(v.name));
    if (preferred) u.voice = preferred;
    window.speechSynthesis.speak(u);
  }
  function addNovaError(msg) {
    const e = addCoach('<span style="color:#f87171">⚠ ' + msg + '</span>');
    console.warn('[nova voice]', msg);
  }

  // ---- Voice: speak your question (Web Speech API speech-to-text) ----
  // iOS Safari support for SpeechRecognition is inconsistent — hide the
  // mic entirely rather than show a button that silently does nothing.
  const micBtn = document.getElementById('mic');
  if (window.DASH_OPENAI_ENABLED && navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
    let recorder = null, chunks = [];
    micBtn.addEventListener('click', async () => {
      if (recorder && recorder.state === 'recording') { recorder.stop(); return; }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        chunks = [];
        recorder = new MediaRecorder(stream);
        recorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
        recorder.onstop = async () => {
          micBtn.classList.remove('listening');
          stream.getTracks().forEach(t => t.stop());
          const blob = new Blob(chunks, { type: recorder.mimeType || 'audio/webm' });
          const reader = new FileReader();
          reader.onload = async () => {
            const base64 = reader.result.split(',')[1];
            const prev = micBtn.textContent;
            micBtn.textContent = '⟳';
            try {
              const res = await fetch('/api/whisper-transcribe', {
                method: 'POST',
                headers: { 'content-type': 'application/json', 'x-app-secret': (window.DASH_APP_SECRET || '') },
                body: JSON.stringify({ audio: base64, mimeType: blob.type }),
              });
              const json = await res.json();
              if (json.text) input.value = json.text;
            } catch(e) {}
            micBtn.textContent = prev;
          };
          reader.readAsDataURL(blob);
        };
        recorder.start();
        micBtn.classList.add('listening');
      } catch(e) { micBtn.classList.remove('listening'); }
    });
  } else {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    micBtn.style.display = 'none';
  } else {
    const recognizer = new SR();
    recognizer.lang = 'en-US';
    recognizer.interimResults = false;
    recognizer.maxAlternatives = 1;
    let listening = false;
    recognizer.onresult = (e) => {
      const said = e.results && e.results[0] && e.results[0][0] && e.results[0][0].transcript;
      if (said) input.value = said;
    };
    recognizer.onend = () => { listening = false; micBtn.classList.remove('listening'); };
    recognizer.onerror = () => { listening = false; micBtn.classList.remove('listening'); };
    micBtn.addEventListener('click', () => {
      if (listening) { recognizer.stop(); return; }
      listening = true;
      micBtn.classList.add('listening');
      try { recognizer.start(); } catch (e) { listening = false; micBtn.classList.remove('listening'); }
    });
  }
  } // close Whisper/SpeechRecognition else

  addCoach('Hey — I am <b>Nova</b>. Ask me about food, training, sleep, or where to start. I keep it short and give you <b>one thing to act on</b>.');
})();
</script>
</body>
</html>
