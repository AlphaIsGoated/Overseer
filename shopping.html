<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Shopping · Dashboard</title>
<script src="/api/config"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>

<style>
:root {
  --text-primary: #FAFAFA; --text-secondary: #B8B6B0; --text-tertiary: #76746E;
  --success: #6BE3A4; --warning: #F2C063; --danger: #FF6B6B;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: #050506; color: var(--text-secondary); font-family: var(--font); -webkit-font-smoothing: antialiased; }
body { min-height: 100vh; position: relative; overflow-x: hidden; padding: max(28px, env(safe-area-inset-top)) 20px 60px; }
body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(circle at 82% 14%, rgba(224,118,88,0.16), transparent 45%), radial-gradient(circle at 18% 90%, rgba(180,180,200,0.06), transparent 50%); filter: blur(40px); pointer-events: none; z-index: -2; animation: drift 36s ease-in-out infinite alternate; }
body::after { content: ''; position: fixed; inset: 0; background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px); background-size: 3px 3px; pointer-events: none; z-index: -1; }
@keyframes drift { 0%{transform:translate3d(0,0,0)} 100%{transform:translate3d(-22px,14px,0)} }

.page { max-width: 700px; margin: 0 auto; }
.back-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px 8px 10px; margin: 0 0 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 999px; color: var(--text-secondary); font-family: inherit; font-size: 12px; font-weight: 600; text-decoration: none; }
.back-btn:hover { background: rgba(255,255,255,0.07); color: var(--text-primary); }
.dash-title { margin: 0 0 4px; font-size: 28px; font-weight: 700; letter-spacing: -0.025em; background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent; }
.dash-sub { font-size: 13px; color: var(--text-tertiary); margin: 0 0 18px; }
@media (max-width: 480px) { .dash-title { font-size: 22px; } }

.section-title { font-size: 10.5px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-tertiary); display: flex; align-items: center; gap: 12px; margin: 18px 0 12px; }
.section-title::before { content: ''; width: 18px; height: 1px; background: var(--text-tertiary); opacity: 0.6; }
.section-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, rgba(255,255,255,0.08), transparent); }
.gm-card { position: relative; background: rgba(255,255,255,0.04); border-radius: 16px; padding: 20px; backdrop-filter: blur(24px) saturate(1.2); -webkit-backdrop-filter: blur(24px) saturate(1.2); box-shadow: 0 12px 40px rgba(0,0,0,0.45); margin-bottom: 14px; }

.style-chip-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
.style-chip { padding: 9px 15px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.10); background: rgba(255,255,255,0.04); color: var(--text-secondary); font-family: inherit; font-size: 12.5px; font-weight: 600; cursor: pointer; }
.style-chip.on { background: color-mix(in srgb, var(--success) 20%, transparent); border-color: var(--success); color: var(--success); }
.gm-input { width: 100%; padding: 11px 14px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; background: rgba(0,0,0,0.28); color: var(--text-primary); font-family: inherit; font-size: 14px; outline: none; }
.gm-input::placeholder { color: var(--text-tertiary); }
.gm-add { padding: 11px 18px; border: 0; border-radius: 12px; background: linear-gradient(180deg, #FFFFFF 0%, #E8E5DD 100%); color: #0A0A0B; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; }
.gm-add:hover { filter: brightness(1.06); }
.gm-add:disabled { opacity: 0.5; cursor: default; }

.rec-block { margin-top: 14px; padding: 14px; border-radius: 12px; background: rgba(110,231,183,0.05); border: 1px solid rgba(110,231,183,0.2); font-size: 13px; line-height: 1.55; color: var(--text-secondary); white-space: pre-wrap; }
.rec-note { font-size: 11px; color: var(--text-tertiary); margin-top: 8px; font-style: italic; }

.purchase-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; margin-bottom: 6px; background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; }
.purchase-info { flex: 1; min-width: 0; }
.purchase-name { font-size: 13.5px; color: var(--text-primary); font-weight: 600; }
.purchase-meta { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }
.purchase-delete { border: 0; background: transparent; color: var(--text-tertiary); font-size: 18px; cursor: pointer; padding: 0 4px; opacity: 0.5; flex-shrink: 0; }
.purchase-delete:hover { color: var(--danger); }
.empty-state { text-align: center; font-size: 12px; font-style: italic; color: var(--text-tertiary); padding: 14px 0; }

.drop-zone { border: 2px dashed rgba(255,255,255,0.12); border-radius: 14px; padding: 24px 16px; text-align: center; cursor: pointer; margin-bottom: 12px; }
.drop-zone:hover { border-color: rgba(255,255,255,0.3); }
.drop-zone-text { font-size: 13px; color: var(--text-primary); font-weight: 600; }
.drop-zone-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 3px; }
.hidden { display: none !important; }

@media (max-width: 480px) { body { padding: max(20px, env(safe-area-inset-top)) 14px 50px; } .gm-card { padding: 16px; } }
</style>
</head>
<body>
<div class="page">

  <a href="index.html" class="back-btn" aria-label="Back to dashboard">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    <span>Back</span>
  </a>

  <h1 class="dash-title">Shopping</h1>
  <p class="dash-sub">Pick your style, get brand/piece ideas to look up yourself, and log purchases by scanning a receipt.</p>

  <div class="gm-card">
    <div class="section-title" style="margin-top:0">Your style</div>
    <div class="style-chip-wrap" id="styleChips">
      <button class="style-chip" data-s="Vintage">Vintage</button>
      <button class="style-chip" data-s="Modern minimalist">Modern minimalist</button>
      <button class="style-chip" data-s="Old money">Old money</button>
      <button class="style-chip" data-s="Streetwear">Streetwear</button>
      <button class="style-chip" data-s="Softboy">Softboy</button>
      <button class="style-chip" data-s="Gym/athletic">Gym/athletic</button>
      <button class="style-chip" data-s="Business casual">Business casual</button>
      <button class="style-chip" data-s="Skater">Skater</button>
    </div>
    <input class="gm-input" id="styleNote" type="text" placeholder="Anything else? (budget, colors you like, an occasion…)" autocomplete="off">
    <button class="gm-add" id="recBtn" type="button">✨ Get recommendations</button>
    <div id="recResult"></div>
  </div>

  <div class="section-title">Purchase log</div>
  <div class="gm-card">
    <div class="drop-zone" id="receiptDrop">
      <div class="drop-zone-text">📷 Scan a receipt or order confirmation</div>
      <div class="drop-zone-sub">Logs item, brand, price — used as context for future recommendations</div>
    </div>
    <input type="file" id="receiptFile" accept="image/*" style="display:none">
    <div id="purchaseBusy" class="empty-state hidden">Reading receipt…</div>
    <div id="purchaseErr" class="hidden" style="font-size:12px;color:var(--danger);margin-bottom:10px"></div>
    <div id="purchaseList"></div>
    <div class="gm-input-wrap" style="display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.06)">
      <input class="gm-input" id="manualName" type="text" placeholder="Item name" style="margin-bottom:0" autocomplete="off">
      <input class="gm-input" id="manualPrice" type="number" min="0" placeholder="Price" style="max-width:90px;margin-bottom:0" inputmode="decimal">
      <button class="gm-add" id="manualAdd" type="button">Add</button>
    </div>
  </div>

</div>

<script>
(function () {
  'use strict';
  const $ = (id) => document.getElementById(id);
  const PURCHASE_KEY = 'shopping_purchases_v1';
  const selectedStyles = new Set();

  function loadJSON(k, f) { try { return JSON.parse(localStorage.getItem(k)) || f; } catch (e) { return f; } }
  function saveJSON(k, v) { localStorage.setItem(k, JSON.stringify(v)); }
  function escapeHtml(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  $('styleChips').querySelectorAll('.style-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const s = chip.dataset.s;
      if (selectedStyles.has(s)) { selectedStyles.delete(s); chip.classList.remove('on'); }
      else { selectedStyles.add(s); chip.classList.add('on'); }
    });
  });

  const REC_SYSTEM =
    "You are a personal style consultant. Based on the styles the user picked and their notes, recommend "
    + "3-4 specific brands per relevant category (tops, bottoms, outerwear, shoes — whichever fit) with 1-2 "
    + "concrete example pieces per brand (e.g. \"Uniqlo — U Crew Neck T-Shirt\"). You do NOT have live "
    + "shopping/search access, so never invent a product URL or claim current stock/pricing — just name "
    + "real brands and realistic piece names worth searching for. If recent purchases are given, avoid "
    + "recommending near-duplicates of what they already own, and note any obvious gaps. Be concise — short "
    + "lists, not paragraphs.";
  $('recBtn').addEventListener('click', async () => {
    const btn = $('recBtn'), box = $('recResult');
    if (!selectedStyles.size) { box.innerHTML = '<div class="rec-block">Pick at least one style above first.</div>'; return; }
    btn.disabled = true; btn.textContent = 'Thinking…';
    box.innerHTML = '<div class="rec-block">Working on it…</div>';
    try {
      const purchases = loadJSON(PURCHASE_KEY, []).slice(-15).map(p => p.name);
      const prompt = 'Styles: ' + Array.from(selectedStyles).join(', ') +
        (($('styleNote').value || '').trim() ? '\nNotes: ' + $('styleNote').value.trim() : '') +
        (purchases.length ? '\nRecent purchases (avoid near-duplicates): ' + purchases.join(', ') : '');
      const res = await fetch('/api/ai/ai-chat', {
        method: 'POST',
        headers: { 'content-type': 'application/json', 'x-app-secret': (window.DASH_APP_SECRET || '') },
        body: JSON.stringify({ system: REC_SYSTEM, messages: [{ role: 'user', content: prompt }] })
      });
      if (window.logApiUsage) window.logApiUsage(res.headers.get('X-Usage-Input-Tokens'), res.headers.get('X-Usage-Output-Tokens'), res.headers.get('X-Usage-Model'), 'shopping');
      const json = await res.json();
      box.innerHTML = (!res.ok || json.error)
        ? '<div class="rec-block">' + escapeHtml(json.error || 'Something went wrong.') + '</div>'
        : '<div class="rec-block">' + escapeHtml(json.text || 'No suggestions.') + '<div class="rec-note">Brand/piece ideas only — no live links or stock/pricing, search these yourself.</div></div>';
    } catch (e) {
      box.innerHTML = '<div class="rec-block">Could not reach the AI.</div>';
    }
    btn.disabled = false; btn.textContent = '✨ Get recommendations';
  });

  // ---- Purchase log: manual entry + receipt scan (reuses the same
  // vision-tool pattern as finance.html's receipt scanner / InBody scans) ----
  function loadPurchases() { return loadJSON(PURCHASE_KEY, []); }
  function savePurchases(list) { saveJSON(PURCHASE_KEY, list); }
  function renderPurchases() {
    const list = loadPurchases().slice().sort((a, b) => b.addedAt - a.addedAt);
    const wrap = $('purchaseList');
    if (!list.length) { wrap.innerHTML = '<div class="empty-state">No purchases logged yet.</div>'; return; }
    wrap.innerHTML = list.map(p =>
      '<div class="purchase-row" data-id="' + p.id + '"><div class="purchase-info"><div class="purchase-name">' + escapeHtml(p.name) + '</div>' +
      '<div class="purchase-meta">' + (p.price ? '$' + Number(p.price).toFixed(2) : 'price unknown') + (p.brand ? ' · ' + escapeHtml(p.brand) : '') + '</div></div>' +
      '<button class="purchase-delete" type="button">×</button></div>'
    ).join('');
    wrap.querySelectorAll('.purchase-delete').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.closest('.purchase-row').dataset.id;
        savePurchases(loadPurchases().filter(p => p.id !== id));
        renderPurchases();
      });
    });
  }
  function addPurchase(p) {
    const list = loadPurchases();
    list.push(Object.assign({ id: 'p_' + Date.now(), addedAt: Date.now() }, p));
    savePurchases(list);
    renderPurchases();
  }

  $('manualAdd').addEventListener('click', () => {
    const name = $('manualName').value.trim();
    if (!name) return;
    addPurchase({ name, price: parseFloat($('manualPrice').value) || 0, brand: '' });
    $('manualName').value = ''; $('manualPrice').value = '';
  });
  $('manualName').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('manualAdd').click(); });

  const RECEIPT_TOOL = {
    name: 'read_purchase',
    description: 'Record the clothing/retail item purchased shown in this receipt or order confirmation.',
    input_schema: {
      type: 'object',
      properties: {
        readable: { type: 'boolean' },
        items: {
          type: 'array',
          items: {
            type: 'object',
            properties: {
              name: { type: 'string', description: 'Item name/description as shown.' },
              brand: { type: 'string', description: 'Brand/store name. Empty if unknown.' },
              price: { type: 'number', description: 'Price paid for this item. 0 if not shown.' }
            },
            required: ['name', 'brand', 'price']
          }
        }
      },
      required: ['readable', 'items']
    }
  };
  function downscaleImage(file, maxDim) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        URL.revokeObjectURL(url);
        let w = img.naturalWidth || img.width, h = img.naturalHeight || img.height;
        const scale = Math.min(1, maxDim / Math.max(w, h || 1));
        w = Math.max(1, Math.round(w * scale)); h = Math.max(1, Math.round(h * scale));
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL('image/jpeg', 0.85).split(',')[1] || '');
      };
      img.onerror = () => { URL.revokeObjectURL(url); reject(new Error("Couldn't read that image.")); };
      img.src = url;
    });
  }
  async function handleReceipt(file) {
    if (!file || !/^image\//.test(file.type)) { $('purchaseErr').textContent = 'Please choose an image.'; $('purchaseErr').classList.remove('hidden'); return; }
    $('purchaseErr').classList.add('hidden');
    $('purchaseBusy').classList.remove('hidden');
    try {
      const base64 = await downscaleImage(file, 1568);
      const res = await fetch('/api/ai/vision-tool', {
        method: 'POST',
        headers: { 'content-type': 'application/json', 'x-app-secret': (window.DASH_APP_SECRET || '') },
        body: JSON.stringify({ system: 'Read clothing/retail receipts and order confirmations precisely.', tool: RECEIPT_TOOL, image: base64, mediaType: 'image/jpeg', prompt: 'Read this receipt/order confirmation and record each item purchased.' })
      });
      if (window.logApiUsage) window.logApiUsage(res.headers.get('X-Usage-Input-Tokens'), res.headers.get('X-Usage-Output-Tokens'), res.headers.get('X-Usage-Model'), 'shopping');
      const data = await res.json();
      $('purchaseBusy').classList.add('hidden');
      if (!res.ok || data.error) { $('purchaseErr').textContent = data.error || 'Could not read that receipt.'; $('purchaseErr').classList.remove('hidden'); return; }
      if (data.readable === false || !(data.items || []).length) { $('purchaseErr').textContent = "Couldn't find any items on that receipt."; $('purchaseErr').classList.remove('hidden'); return; }
      data.items.forEach(it => addPurchase({ name: it.name, brand: it.brand || '', price: it.price || 0 }));
    } catch (e) {
      $('purchaseBusy').classList.add('hidden');
      $('purchaseErr').textContent = (e && e.message) || "Couldn't reach the AI.";
      $('purchaseErr').classList.remove('hidden');
    }
  }
  $('receiptDrop').addEventListener('click', () => $('receiptFile').click());
  $('receiptFile').addEventListener('change', (e) => { const f = e.target.files && e.target.files[0]; if (f) handleReceipt(f); e.target.value = ''; });

  window.addEventListener('storage', renderPurchases);
  renderPurchases();

  if (window.initCloudSync) {
    window.initCloudSync({ appKey: 'shopping', syncedKeys: [PURCHASE_KEY], onApplied: renderPurchases });
  }
})();
</script>
</body>
</html>
