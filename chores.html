<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Chores · Dashboard</title>

<script src="sync.js"></script>
<script src="topbar.js" defer></script>

<style>
:root {
  --text-primary: #FAFAFA; --text-secondary: #B8B6B0; --text-tertiary: #76746E;
  --success: #6BE3A4; --warning: #F2C063; --danger: #FF6B6B;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: #050506; color: var(--text-secondary); font-family: var(--font); -webkit-font-smoothing: antialiased; }
body { min-height: 100vh; position: relative; overflow-x: hidden; padding: max(28px, env(safe-area-inset-top)) 20px 60px; }
body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(circle at 82% 14%, rgba(224,118,88,0.16), transparent 45%), radial-gradient(circle at 18% 90%, rgba(180,180,200,0.06), transparent 50%); filter: blur(40px); pointer-events: none; z-index: -2; animation: drift 36s ease-in-out infinite alternate; }
body::after { content: ''; position: fixed; inset: 0; background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px); background-size: 3px 3px; pointer-events: none; z-index: -1; }
@keyframes drift { 0%{transform:translate3d(0,0,0)} 100%{transform:translate3d(-22px,14px,0)} }

.page { max-width: 700px; margin: 0 auto; }
.back-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px 8px 10px; margin: 0 0 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 999px; color: var(--text-secondary); font-family: inherit; font-size: 12px; font-weight: 600; text-decoration: none; }
.back-btn:hover { background: rgba(255,255,255,0.07); color: var(--text-primary); }
.dash-title { margin: 0 0 14px; font-size: 28px; font-weight: 700; letter-spacing: -0.025em; background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent; }
@media (max-width: 480px) { .dash-title { font-size: 22px; } }

.section-title { font-size: 10.5px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-tertiary); display: flex; align-items: center; gap: 12px; margin: 18px 0 12px; }
.section-title::before { content: ''; width: 18px; height: 1px; background: var(--text-tertiary); opacity: 0.6; }
.section-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, rgba(255,255,255,0.08), transparent); }
.gm-card { position: relative; background: rgba(255,255,255,0.04); border-radius: 16px; padding: 20px; backdrop-filter: blur(24px) saturate(1.2); -webkit-backdrop-filter: blur(24px) saturate(1.2); box-shadow: 0 12px 40px rgba(0,0,0,0.45); }

.chore-row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; margin-bottom: 6px; background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; transition: background 0.2s, opacity 0.3s; }
.chore-row:hover { background: rgba(255,255,255,0.06); }
.chore-row.done { opacity: 0.45; background: rgba(107,227,164,0.04); }
.chore-row.done .chore-text { text-decoration: line-through; text-decoration-color: rgba(255,255,255,0.4); }
.chore-check { appearance: none; -webkit-appearance: none; width: 22px; height: 22px; flex-shrink: 0; margin: 0; border: 1.5px solid rgba(255,255,255,0.18); background: rgba(0,0,0,0.28); border-radius: 7px; position: relative; cursor: pointer; transition: background 0.2s, border-color 0.2s; }
.chore-check:checked { background: var(--success); border-color: var(--success); box-shadow: 0 0 12px rgba(107,227,164,0.40); }
.chore-check:checked::after { content: ''; position: absolute; left: 6px; top: 2px; width: 6px; height: 11px; border: solid #0A0A0B; border-width: 0 2.5px 2.5px 0; transform: rotate(45deg); }
.chore-text { flex: 1; font-size: 14px; color: var(--text-primary); }
.chore-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-tertiary); padding: 3px 7px; border-radius: 999px; background: rgba(255,255,255,0.05); flex-shrink: 0; }
.chore-delete { border: 0; background: transparent; color: var(--text-tertiary); font-size: 18px; cursor: pointer; padding: 0 4px; opacity: 0.5; }
.chore-row:hover .chore-delete { opacity: 1; }
.chore-delete:hover { color: var(--danger); }
.empty-state { text-align: center; font-size: 12px; font-style: italic; color: var(--text-tertiary); padding: 14px 0; }

.gm-input-wrap { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.06); }
.gm-input { flex: 1; min-width: 120px; padding: 11px 14px; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; background: rgba(0,0,0,0.28); color: var(--text-primary); font-family: inherit; font-size: 14px; outline: none; }
.gm-input::placeholder { color: var(--text-tertiary); }
.gm-seg { display: inline-flex; border: 1px solid rgba(255,255,255,0.10); border-radius: 11px; overflow: hidden; flex-shrink: 0; }
.gm-seg button { padding: 11px 12px; border: 0; background: transparent; color: var(--text-secondary); font-family: inherit; font-size: 12px; font-weight: 700; cursor: pointer; }
.gm-seg button.on { background: rgba(255,255,255,0.10); color: var(--text-primary); }
.gm-add { padding: 11px 18px; border: 0; border-radius: 12px; background: linear-gradient(180deg, #FFFFFF 0%, #E8E5DD 100%); color: #0A0A0B; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; }
.gm-add:hover { filter: brightness(1.06); }

@media (max-width: 480px) { body { padding: max(20px, env(safe-area-inset-top)) 14px 50px; } .gm-card { padding: 16px; } }
</style>
</head>
<body>
<div class="page">

  <a href="index.html" class="back-btn" aria-label="Back to dashboard">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    <span>Back</span>
  </a>

  <h1 class="dash-title">Chores &amp; Reminders</h1>

  <div class="section-title">Today</div>
  <div class="gm-card">
    <div id="choreListToday"></div>
  </div>

  <div class="section-title">Add</div>
  <div class="gm-card">
    <div class="gm-input-wrap">
      <input class="gm-input" id="choreInput" type="text" placeholder="e.g. Take out trash" autocomplete="off">
      <div class="gm-seg" id="choreFreqSeg">
        <button data-f="none" class="on">One-off</button>
        <button data-f="daily">Daily</button>
        <button data-f="weekly">Weekly</button>
      </div>
      <button class="gm-add" id="choreAdd" type="button">Add</button>
    </div>
  </div>

  <div class="section-title">All chores</div>
  <div class="gm-card">
    <div id="choreListAll"></div>
  </div>

</div>

<script>
(function () {
  'use strict';
  const $ = (id) => document.getElementById(id);
  const STORE_KEY = 'chores:items';
  let freq = 'none';

  function dateKey(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
  function isoWeekKey(d) {
    const dt = new Date(d); dt.setHours(0,0,0,0);
    dt.setDate(dt.getDate() + ((dt.getDay() + 6) % 7) * -1); // back up to Monday
    return dateKey(dt);
  }
  const today = dateKey(new Date());
  const thisWeek = isoWeekKey(new Date());

  function load() { try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; } catch (e) { return []; } }
  function save(items) {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(items)); } catch (e) { console.error('[chores] localStorage full:', e); }
    fetch('/api/db', { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-App-Secret': window.DASH_APP_SECRET || '' },
      body: JSON.stringify({ key: 'chores', data: { [STORE_KEY]: items } }) }).catch(function(e) { console.warn('[chores] push failed:', e); });
  }
  function escapeHtml(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  // A recurring item's "done" state is derived from when it was last
  // completed, not a sticky boolean — so it naturally resets each new
  // day/week without a cron job or background process.
  function isDone(item) {
    if (item.recurring === 'daily') return item.lastDoneKey === today;
    if (item.recurring === 'weekly') return item.lastDoneKey === thisWeek;
    return !!item.done;
  }
  function setDone(item, val) {
    if (item.recurring === 'daily') { item.lastDoneKey = val ? today : null; }
    else if (item.recurring === 'weekly') { item.lastDoneKey = val ? thisWeek : null; }
    else { item.done = val; }
  }

  function rowHtml(item) {
    const done = isDone(item);
    const tag = item.recurring === 'daily' ? 'Daily' : item.recurring === 'weekly' ? 'Weekly' : '';
    return '<div class="chore-row' + (done ? ' done' : '') + '" data-id="' + item.id + '">' +
      '<input type="checkbox" class="chore-check" ' + (done ? 'checked' : '') + '>' +
      '<span class="chore-text">' + escapeHtml(item.text) + '</span>' +
      (tag ? '<span class="chore-tag">' + tag + '</span>' : '') +
      '<button class="chore-delete" type="button">×</button>' +
      '</div>';
  }
  function wireRow(el, items) {
    const id = el.dataset.id;
    el.querySelector('.chore-check').addEventListener('change', (e) => {
      const item = items.find(x => x.id === id);
      setDone(item, e.target.checked);
      save(items);
      render();
    });
    el.querySelector('.chore-delete').addEventListener('click', () => {
      save(items.filter(x => x.id !== id));
      render();
    });
  }

  function render() {
    const items = load();
    // "Today" view: anything not yet done (one-off pending, or a
    // recurring item not yet done this period). Done recurring items
    // still show, struck through, as confirmation it was handled.
    const todayItems = items; // all chores are relevant "today" in this simple model
    const listToday = $('choreListToday');
    if (!todayItems.length) {
      listToday.innerHTML = '<div class="empty-state">Nothing on the list — add a chore below.</div>';
    } else {
      const pending = todayItems.filter(i => !isDone(i));
      const done = todayItems.filter(i => isDone(i));
      listToday.innerHTML = pending.concat(done).map(rowHtml).join('');
      listToday.querySelectorAll('.chore-row').forEach(el => wireRow(el, items));
    }
    const listAll = $('choreListAll');
    if (!items.length) {
      listAll.innerHTML = '<div class="empty-state">No chores yet.</div>';
    } else {
      listAll.innerHTML = items.map(rowHtml).join('');
      listAll.querySelectorAll('.chore-row').forEach(el => wireRow(el, items));
    }
  }

  $('choreFreqSeg').querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      freq = b.dataset.f;
      $('choreFreqSeg').querySelectorAll('button').forEach(x => x.classList.remove('on'));
      b.classList.add('on');
    });
  });
  function addChore() {
    const text = $('choreInput').value.trim();
    if (!text) return;
    const items = load();
    items.push({ id: 'c_' + Date.now(), text, recurring: freq, done: false, lastDoneKey: null });
    save(items);
    $('choreInput').value = '';
    render();
  }
  $('choreAdd').addEventListener('click', addChore);
  $('choreInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') addChore(); });

  render();

  if (window.initCloudSync) {
    window.initCloudSync({ appKey: 'chores', syncedKeys: [STORE_KEY], onApplied: render });
  }
})();
</script>
</body>
</html>
