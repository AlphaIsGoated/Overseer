<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0b">
<title>Sign in</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: #0A0A0B; color: #FAFAFA;
  font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  min-height: 100%; min-height: 100dvh;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.card {
  width: 100%; max-width: 360px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 18px; padding: 28px 24px;
}
.title { font-size: 20px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 6px; }
.sub { font-size: 13px; color: #76746E; margin-bottom: 22px; }
.field-label { font-size: 10.5px; font-weight: 700; letter-spacing: 0.10em; text-transform: uppercase; color: #76746E; margin-bottom: 7px; display: block; }
input[type="password"] {
  width: 100%; padding: 12px 14px; border-radius: 11px;
  border: 1px solid rgba(255,255,255,0.10); background: rgba(0,0,0,0.3);
  color: #FAFAFA; font-family: inherit; font-size: 15px; outline: none;
}
input[type="password"]:focus { border-color: rgba(110,231,183,0.5); }
button {
  width: 100%; margin-top: 16px; padding: 13px; border: none; border-radius: 11px;
  background: #6EE7B7; color: #04140d; font-family: inherit; font-size: 14px; font-weight: 700;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
}
button:disabled { opacity: 0.6; cursor: default; }
.error {
  margin-top: 14px; font-size: 12.5px; color: #FF8A8A;
  background: rgba(255,138,138,0.08); border: 1px solid rgba(255,138,138,0.2);
  border-radius: 10px; padding: 10px 12px; display: none;
}
.error.show { display: block; }
</style>
</head>
<body>
  <div class="card">
    <div class="title">Sign in</div>
    <div class="sub">Enter the site password to continue.</div>
    <form id="loginForm">
      <label class="field-label" for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" autofocus required>
      <button type="submit" id="submitBtn">Sign in</button>
      <div class="error" id="errorMsg"></div>
    </form>
  </div>

<script>
(function () {
  const form = document.getElementById('loginForm');
  const errorEl = document.getElementById('errorMsg');
  const submitBtn = document.getElementById('submitBtn');
  const params = new URLSearchParams(location.search);
  const next = params.get('next') || '/';

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorEl.classList.remove('show');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Signing in…';
    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ password: document.getElementById('password').value })
      });
      if (res.ok) {
        location.href = next;
        return;
      }
      const data = await res.json().catch(() => ({}));
      errorEl.textContent = data.error || 'Incorrect password.';
      errorEl.classList.add('show');
    } catch (e) {
      errorEl.textContent = 'Could not reach the server — check your connection.';
      errorEl.classList.add('show');
    }
    submitBtn.disabled = false;
    submitBtn.textContent = 'Sign in';
  });
})();
</script>
</body>
</html>
